<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Night Shift Wizard: Arcane Overdrive v2.0</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111118;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            border: 4px solid #333;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            background: linear-gradient(to bottom, #050510 0%, #111128 100%);
            cursor: none;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .game-over-screen {
            display: none;
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            pointer-events: auto;
            border: 2px solid #5d275d;
            border-radius: 8px;
        }

        .boss-warning {
            display: none;
            position: absolute;
            top: 40%;
            color: #ff4444;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff0000;
            animation: blink 0.5s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        button {
            background-color: #5d275d;
            color: white;
            border: 2px solid #8a3a8a;
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 15px;
            font-family: inherit;
            text-transform: uppercase;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover { background-color: #8a3a8a; }
        button:active { background-color: #d15cd1; }
    </style>
</head>

            osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
            gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'chime') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(880, now + 0.1);
            gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'crunch') {
            osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
            gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'bossHit') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
            gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        }
    }

    // --- UTILS ---
    function drawPixelSprite(sprite, x, y, size) {
        const pixelSize = size / 16;
        for (let r = 0; r < sprite.length; r++) {
            for (let c = 0; c < sprite[r].length; c++) {
                const colorKey = sprite[r][c];
                if (colorKey !== 'tr') {
                    ctx.fillStyle = colors[colorKey] || '#ff00ff';
                    ctx.fillRect(x + (c * pixelSize), y + (r * pixelSize), pixelSize + 0.5, pixelSize + 0.5);
                }
            }
        }
    }

    function resize() {
        const scale = Math.min(window.innerWidth / V_WIDTH, window.innerHeight / V_HEIGHT);
        canvas.width = V_WIDTH * scale; canvas.height = V_HEIGHT * scale; ctx.scale(scale, scale);
    }
    window.addEventListener('resize', resize);
    resize();

    // --- INPUT ---
    function updatePointerPosition(clientX) {
        const rect = canvas.getBoundingClientRect();
        mouseX = (clientX - rect.left) * (V_WIDTH / rect.width) - (player.w / 2);
    }
    
    window.addEventListener('mousemove', e => updatePointerPosition(e.clientX));
    canvas.addEventListener('touchstart', e => { updatePointerPosition(e.touches[0].clientX); e.preventDefault(); }, {passive: false});
    canvas.addEventListener('touchmove', e => { updatePointerPosition(e.touches[0].clientX); e.preventDefault(); }, {passive: false});

    window.addEventListener('keydown', e => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        initAudio();
    });
    window.addEventListener('keyup', e => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
    });

    // --- LOGIC ---
    function spawnItem() {
        let type = 'skull', sprite = skullSprite, w = 24, h = 24, sBase = 110, col = '#8b0000';
        
        let categoryRoll = Math.random();

        // 10% Chance for a Powerup
        if (categoryRoll > 0.90) {
            let pRoll = Math.random();
            if (pRoll > 0.75 && score >= 3000) { type = 'rocket'; sprite = rocketSprite; sBase = 140; col = '#39ff14'; }
            else if (pRoll > 0.50 && score >= 2000) { type = 'blast'; sprite = blastSprite; sBase = 140; col = '#ff4444'; }
            else if (pRoll > 0.25 && score >= 800) { type = 'magnet'; sprite = magnetSprite; sBase = 140; col = '#ff00ff'; }
            else { type = 'potion'; sprite = potionSprite; sBase = 130; col = '#00ffff'; } // Potion is the default early-game powerup
        } 
        // 25% Chance for Good Items (Points)
        else if (categoryRoll > 0.65) {
            if (Math.random() > 0.5 && score >= 200) { type = 'comet'; sprite = cometSprite; w = 28; h = 28; sBase = 220; col = '#ffd700'; }
            else { type = 'star'; sprite = starSprite; sBase = 120; col = '#ffffff'; } // Star is the default
        } 
        // 65% Chance for Hazards (Enemies)
        else {
            let eRoll = Math.random();
            if (eRoll > 0.85 && score >= 2500) { type = 'bat'; sprite = batSprite; sBase = 120; col = '#a9a9a9'; }
            else if (eRoll > 0.65 && score >= 1100) { type = 'specter'; sprite = specterSprite; sBase = 75; col = '#ffffff'; }
            else if (eRoll > 0.35 && score >= 500) { type = 'phantom'; sprite = phantomSprite; sBase = 100; col = '#6a31a1'; }
            else { type = 'skull'; sprite = skullSprite; sBase = 110; col = '#8b0000'; } // Skull is the default early-game enemy
        }

        items.push({
            x: Math.random() * (V_WIDTH - w), y: -30, w: w, h: h, 
            type: type, sprite: sprite, speed: sBase * (baseSpeed / 100), color: col,
            wave: Math.random() * Math.PI * 2, vx: 0, split: false
        });
    }

    function spawnParticles(x, y, color) {
        for(let i=0; i<10; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 120 + 50;
            particles.push({ x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 0.5, color: color });
        }
    }

    function resetGame() {
        score = 0; items = []; particles = []; isGameOver = false;
        player.x = V_WIDTH / 2 - 16; mouseX = V_WIDTH / 2;
        player.hasShield = false; comboMult = 1; comboTimer = 0;
        baseSpeed = 150; 
        
        rocketTimer = 0; magnetTimer = 0; laserTimer = 0;
        keys = { left: false, right: false }; 
        
        bossLevel = 0; bossActive = false; nextBossScore = 1500; 
        bossWarning.style.display = 'none'; gameOverScreen.style.display = 'none';
        
        lastTime = performance.now();
        requestAnimationFrame(update);
    }

    function update(timestamp) {
        if (isGameOver) return;
        
        let dt = (timestamp - lastTime) / 1000 || 0.016; 
        if (dt > 0.1) dt = 0.1; 
        lastTime = timestamp;

        // --- ROCKET BOOTS TIME WARP ---
        let worldDt = dt;
        if (rocketTimer > 0) {
            rocketTimer -= dt;
            worldDt = dt * 5; // Simulates 5x screen scrolling speed!
            if (Math.random() > 0.3) spawnParticles(player.x + player.w/2, player.y + player.h, '#39ff14');
        }

        // Other Timers
        if (magnetTimer > 0) magnetTimer -= dt;
        if (laserTimer > 0) laserTimer -= dt;
        if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) comboMult = 1; }

        // PLAYER MOVEMENT (Uses standard dt to stay controllable)
        if (keys.left) {
            player.x -= player.speed * dt;
            mouseX = player.x; 
        } else if (keys.right) {
            player.x += player.speed * dt;
            mouseX = player.x;
        } else {
            player.x += (mouseX - player.x) * (player.speed/50) * dt;
        }

        if (player.x < 0) { player.x = 0; mouseX = 0; }
        if (player.x > V_WIDTH - player.w) { player.x = V_WIDTH - player.w; mouseX = V_WIDTH - player.w; }

        // BOSS LOGIC (Uses worldDt so they speed up during Rocket Boots)
        if (score >= nextBossScore && !bossActive) {
            bossActive = true; boss.type = bossLevel % 4; boss.maxHp = 5 + (bossLevel * 2); boss.hp = boss.maxHp;
            boss.y = -80; boss.wave = 0; boss.teleportTimer = 0;
            bossWarning.style.display = 'block'; setTimeout(() => bossWarning.style.display = 'none', 2000);
            playSound('bossHit');
        }

        if (bossActive) {
            if (boss.y < 20) {
                boss.y += 50 * worldDt; 
            } else {
                if (boss.type === 0) { boss.x += boss.speed * boss.dir * worldDt; if (boss.x < 0 || boss.x > V_WIDTH - boss.w) boss.dir *= -1; } 
                else if (boss.type === 1) { boss.wave += worldDt; boss.x = (V_WIDTH/2 - boss.w/2) + Math.sin(boss.wave * 1.5) * 100; } 
                else if (boss.type === 2) { boss.x += boss.speed * 1.5 * boss.dir * worldDt; if (boss.x < 0 || boss.x > V_WIDTH - boss.w) boss.dir *= -1; boss.wave += worldDt * 4; boss.y = 20 + Math.abs(Math.sin(boss.wave)) * 60; } 
                else if (boss.type === 3) { boss.teleportTimer += worldDt; if (boss.teleportTimer > 2.5) { boss.x = Math.random() * (V_WIDTH - boss.w); boss.teleportTimer = 0; spawnParticles(boss.x + boss.w/2, boss.y + boss.h/2, '#808080'); } }

                boss.attackTimer += worldDt;
                let atkRate = Math.max(0.4, 0.8 - (bossLevel * 0.05));
                if (boss.attackTimer > atkRate) {
                    boss.attackTimer = 0;
                    let isWeakness = Math.random() > 0.85; 
                    if (isWeakness) { items.push({ x: boss.x + boss.w/2 - 12, y: boss.y + boss.h, w: 24, h: 24, type: 'holyStar', sprite: holyStarSprite, speed: 130, vx: 0, color: '#00ffff' }); } 
                    else {
                        if (boss.type === 0) { items.push({ x: boss.x + boss.w/2 - 12, y: boss.y + boss.h, w: 24, h: 24, type: 'fireball', sprite: fireballSprite, speed: 220, vx: 0, color: '#ff4444' }); } 
                        else if (boss.type === 1) { for(let j=-1; j<=1; j++) items.push({ x: boss.x + boss.w/2 - 12, y: boss.y + boss.h, w: 24, h: 24, type: 'fireball', sprite: fireballSprite, speed: 200, vx: j * 80, color: '#8a2be2' }); } 
                        else if (boss.type === 2) { items.push({ x: boss.x + boss.w/2 - 12, y: boss.y + boss.h, w: 24, h: 24, type: 'phantom', sprite: phantomSprite, speed: 160, wave: Math.random() * Math.PI, vx: 0, color: '#006400' }); } 
                        else if (boss.type === 3) { 
                            let gap = Math.floor(Math.random() * 5); let stagger = Math.floor(Math.random() * 3);
                            for(let k=0; k<5; k++) { 
                                if (k !== gap) {
                                    let yOff = (stagger===0) ? k*28 : (stagger===1) ? (4-k)*28 : Math.abs(2-k)*25;
                                    items.push({ x: (V_WIDTH/5) * k + 10, y: boss.y + boss.h - yOff, w: 24, h: 24, type: 'skull', sprite: skullSprite, speed: 160, vx: 0, color: '#a9a9a9' }); 
                                } 
                            } 
                        }
                    }
                }
            }
        } else {
            spawnTimer += worldDt;
            if (spawnTimer > Math.max(0.3, 0.8 - (score / 5000))) { spawnItem(); spawnTimer = 0; }
        }

        // ITEM LOGIC
        for (let i = items.length - 1; i >= 0; i--) {
            let item = items[i];
            
            // Apply World Time Warp (worldDt)
            item.y += item.speed * worldDt;
            item.x += (item.vx || 0) * worldDt;

            // ENEMY PATTERNS
            if (item.type === 'phantom') { 
                item.wave += worldDt * 5; 
                item.x += Math.sin(item.wave) * 150 * worldDt; 
            }
            if (item.type === 'specter') {
                // Tracks player X smoothly
                item.x += Math.sign(player.x - item.x) * 60 * worldDt;
            }
            if (item.type === 'bat' && item.y > V_HEIGHT * 0.35 && !item.split) {
                // Splitter Bat burst into two fast small bats
                items.push({ x: item.x, y: item.y, w: 16, h: 16, type: 'smallBat', sprite: batSprite, speed: item.speed * 1.3, vx: -100, color: item.color });
                items.push({ x: item.x + 8, y: item.y, w: 16, h: 16, type: 'smallBat', sprite: batSprite, speed: item.speed * 1.3, vx: 100, color: item.color });
                spawnParticles(item.x + 12, item.y + 12, '#ff4444');
                items.splice(i, 1);
                continue;
            }

            // Magnet pulling good items (uses real dt so it pulls even if world is warped)
            if (magnetTimer > 0 && (item.type === 'star' || item.type === 'comet' || item.type === 'holyStar')) {
                item.x += Math.sign(player.x - item.x) * 150 * dt; 
            }

            let isBad = ['skull', 'phantom', 'fireball', 'specter', 'bat', 'smallBat'].includes(item.type);

            // Laser Blast Destroying Bad Items
            if (laserTimer > 0 && item.x < player.x + 20 && item.x + item.w > player.x + 12 && item.y < player.y) {
                if (isBad) {
                    spawnParticles(item.x + item.w/2, item.y + item.h/2, '#ff4444');
                    items.splice(i, 1);
                    score += 20 * comboMult;
                    continue;
                }
            }

            let hitPad = isBad ? 6 : -6;
            let hit = { x: item.x + hitPad, y: item.y + hitPad, w: item.w - (hitPad*2), h: item.h - (hitPad*2) };

            // COLLISION
            if (player.x < hit.x + hit.w && player.x + player.w > hit.x && player.y < hit.y + hit.h && player.y + player.h > hit.y) {
                
                if (isBad) {
                    if (rocketTimer > 0) {
                        // Rocket Boots Absolute Invincibility + Ramming Combo!
                        playSound('crunch'); spawnParticles(item.x + item.w/2, item.y + item.h/2, '#39ff14');
                        score += 50 * comboMult; items.splice(i, 1);
                    } else if (player.hasShield) {
                        player.hasShield = false; playSound('crunch');
                        spawnParticles(item.x + item.w/2, item.y + item.h/2, '#00ffff');
                        items.splice(i, 1);
                    } else {
                        playSound('crunch'); isGameOver = true;
                        gameOverScreen.style.display = 'block'; finalScoreText.innerText = `Final Score: ${score}`; return;
                    }
                } else {
                    if (item.type === 'star') score += 10 * comboMult;
                    if (item.type === 'comet') score += 50 * comboMult;
                    
                    if (item.type === 'holyStar') {
                        playSound('bossHit'); boss.hp--; spawnParticles(boss.x + boss.w/2, boss.y + boss.h/2, '#00ffff');
                        if (boss.hp <= 0) {
                            bossActive = false; score += 500 * comboMult; nextBossScore = score + 1500;
                            bossLevel++; baseSpeed += 15; playSound('chime'); spawnParticles(boss.x + boss.w/2, boss.y + boss.h/2, '#ffd700');
                        }
                    } 
                    // Powerups
                    else if (item.type === 'potion') { player.hasShield = true; playSound('chime'); } 
                    else if (item.type === 'rocket') { rocketTimer = 5.0; playSound('chime'); }
                    else if (item.type === 'magnet') { magnetTimer = 5.0; playSound('chime'); }
                    else if (item.type === 'blast')  { laserTimer = 2.0; playSound('bossHit'); }
                    else { playSound('bloop'); comboMult++; comboTimer = 3.0; baseSpeed += 1; }
                    
                    spawnParticles(item.x + item.w/2, item.y + item.h/2, item.color);
                    items.splice(i, 1);
                }
                continue;
            }
            if (item.y > V_HEIGHT || item.x < -100 || item.x > V_WIDTH + 100) items.splice(i, 1);
        }

        // Particles speed up with World Time Warp
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.x += p.vx * worldDt; p.y += p.vy * worldDt; p.vx *= 0.9; p.vy *= 0.9; p.life -= worldDt;
            if (p.life <= 0) particles.splice(i, 1);
        }

        render(); requestAnimationFrame(update);
    }

    function render() {
        ctx.clearRect(0, 0, V_WIDTH, V_HEIGHT);

        if (laserTimer > 0) {
            ctx.fillStyle = 'rgba(255, 68, 68, 0.8)';
            ctx.fillRect(player.x + 8, 0, 16, player.y + 16);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.fillRect(player.x + 12, 0, 8, player.y + 16);
        }

        if (player.hasShield) {
            ctx.beginPath(); ctx.arc(player.x + player.w/2, player.y + player.h/2, player.w/1.4, 0, Math.PI * 2);
            ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2; ctx.stroke();
        }

        drawPixelSprite(wizardSprite, player.x, player.y, player.w);
        items.forEach(item => drawPixelSprite(item.sprite, item.x, item.y, item.w));

        if (bossActive && boss.y > -boss.h) {
            drawPixelSprite(bossSprites[boss.type], boss.x, boss.y, boss.w);
            ctx.fillStyle = '#333'; ctx.fillRect(boss.x, boss.y - 10, boss.w, 6);
            ctx.fillStyle = '#ff4444'; ctx.fillRect(boss.x, boss.y - 10, boss.w * (boss.hp / boss.maxHp), 6);
        }

        particles.forEach(p => {
            ctx.fillStyle = p.color; 
            ctx.globalAlpha = Math.max(0, p.life / 0.5);
            ctx.fillRect(p.x, p.y, 4, 4);
        });
        ctx.globalAlpha = 1.0;

        ctx.fillStyle = "#fff"; ctx.font = "bold 16px 'Courier New'"; ctx.textAlign = "left";
        ctx.shadowColor = "rgba(0, 0, 0, 0.8)"; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2; ctx.shadowBlur = 2;
        
        ctx.fillText(`SCORE: ${score}`, 10, 25);
        if (comboMult > 1) {
            ctx.fillStyle = comboMult > 4 ? '#ff4444' : '#ffd700';
            ctx.fillText(`COMBO x${comboMult}`, 10, 45);
        }
        ctx.shadowColor = "transparent";
    }

    requestAnimationFrame(update);

</script>
</body>
</html>
