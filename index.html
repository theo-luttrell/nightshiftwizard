<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Night Shift Wizard: Arcane Overdrive</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b1a;
            color: #fff;
            font-family: 'Press Start 2P', 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
            border: 4px solid #333;
            background-color: #050510;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            background: linear-gradient(to bottom, #050510 0%, #111128 100%);
            cursor: none;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .overlay-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: rgba(5, 5, 16, 0.95);
            padding: 20px;
            pointer-events: auto;
            border: 2px solid #5d275d;
            border-radius: 8px;
            width: 80%;
            max-width: 280px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .pixel-title {
            font-size: 18px;
            color: #ff00ff;
            text-shadow: 3px 3px 0px #3e1a5f;
            margin-bottom: 5px;
            line-height: 1.4;
            cursor: pointer;
        }

        .subtitle {
            font-size: 8px;
            color: #00ffff;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .currency-display {
            color: #ff00ff;
            font-size: 10px;
            margin-bottom: 10px;
        }

        .stat-line {
            font-size: 8px;
            color: #ffd700;
            margin-bottom: 10px;
        }

        /* Shop Styling */
        .shop-item {
            width: 100%;
            background: #1a1a3a;
            border: 1px solid #5d275d;
            margin: 5px 0;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .shop-header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 7px;
            margin-bottom: 4px;
        }
        .item-lvl { color: #00ffff; }
        .item-cost { font-size: 7px; color: #ff00ff; margin-bottom: 5px; }

        .menu-text {
            font-size: 9px;
            line-height: 1.8;
            margin-bottom: 15px;
            color: #e0e0e0;
        }

        .boss-warning {
            display: none;
            position: absolute;
            top: 35%;
            color: #ff4444;
            font-size: 14px;
            text-shadow: 2px 2px 0px #000;
            animation: blink 0.4s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        button {
            background-color: #3e1a5f;
            color: white;
            border: 2px solid #8a3a8a;
            padding: 12px;
            font-size: 9px;
            cursor: pointer;
            margin-top: 10px;
            font-family: inherit;
            width: 100%;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) { background-color: #6a31a1; transform: scale(1.05); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        label { font-size: 9px; display: flex; align-items: center; cursor: pointer; margin: 10px 0; }
        input[type="checkbox"] { width: 14px; height: 14px; margin-right: 10px; cursor: pointer; }

        .new-record { color: #39ff14; font-size: 10px; animation: blink 0.3s infinite alternate; display: none; margin-bottom: 10px; }

    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            
            <div id="mainMenuScreen" class="overlay-screen">
                <h1 class="pixel-title" onclick="registerSecretClick()">NIGHT SHIFT WIZARD</h1>
                <p class="subtitle">ARCANE OVERDRIVE v5.1</p>
                <div class="currency-display">✧ <span id="mainShards">0</span></div>
                <div class="stat-line">HI-SCORE: <span id="menuHS">0</span></div>
                <button onclick="startGame(false)">PLAY ARCADE</button>
                <button onclick="startGame(true)" style="color:#ff4444;">BOSS RUSH</button>
                <button onclick="switchScreen('shopScreen'); updateShopUI();">THE ARMORY</button>
                <button onclick="switchScreen('howToPlayScreen')">HOW TO PLAY</button>
                <button onclick="switchScreen('optionsScreen')">OPTIONS</button>
            </div>

            <div id="shopScreen" class="overlay-screen" style="display: none;">
                <h2 style="font-size: 12px; color: #ffd700;">WIZARD'S SHOP</h2>
                <div class="currency-display">SHARDS: <span id="shopShards">0</span></div>
                <div id="shopList" style="width: 100%;"></div>
                <button onclick="switchScreen('mainMenuScreen')">BACK</button>
            </div>

            <div id="howToPlayScreen" class="overlay-screen" style="display: none;">
                <h2 style="font-size: 12px; color: #ffd700;">HOW TO PLAY</h2>
                <div class="menu-text" style="text-align: left;">
                    <span style="color:#fff;">CATCH:</span> Stars & Comets<br>
                    <span style="color:#ff4444;">DODGE:</span> Skulls & Hazards<br>
                    <span style="color:#ff00ff;">SHARDS:</span> Save for Upgrades<br>
                    <span style="color:#00ffff;">POTION:</span> Arcane Shield<br>
                    <span style="color:#ffd700;">WATCH:</span> Freeze Time
                </div>
                <button onclick="switchScreen('mainMenuScreen')">BACK</button>
            </div>

            <div id="optionsScreen" class="overlay-screen" style="display: none;">
                <h2 style="font-size: 12px; color: #ffd700;">OPTIONS</h2>
                <label><input type="checkbox" id="muteToggle" onchange="toggleMute()"> Mute Sound</label>
                <label><input type="checkbox" id="bgToggle" checked onchange="toggleBg()"> Show Stars</label>
                <button onclick="switchScreen('mainMenuScreen')">BACK</button>
            </div>

            <div id="devToolsScreen" class="overlay-screen" style="display: none; border-color: #39ff14;">
                <h2 style="font-size: 14px; color: #39ff14;">DEV TOOLS</h2>
                <label style="color: #39ff14;"><input type="checkbox" id="invincibilityToggle" onchange="toggleInvincibility()"> INVINCIBILITY</label>
                <button style="background-color: #006400;" onclick="switchScreen('mainMenuScreen')">CLOSE</button>
            </div>

            <div id="bossWarning" class="boss-warning">BOSS APPROACHING!</div>
            
            <div id="gameOverScreen" class="overlay-screen" style="display: none;">
                <h1 style="color: #ff4444; font-size: 20px;">CURSED!</h1>
                <p id="newRecordText" class="new-record">NEW RECORD!</p>
                <p id="finalScoreText" style="font-size: 10px; margin-bottom: 10px;">Score: 0</p>
                <p id="earnedShardsText" style="font-size: 8px; color: #ff00ff; margin-bottom: 15px;">+0 Shards Found</p>
                <button onclick="startGame(isBossRushMode)">RETRY</button>
                <button onclick="switchScreen('mainMenuScreen')">MENU</button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // --- PERSISTENCE & UPGRADES (v5.1) ---
    const UPGRADE_CONFIG = {
        shield: { name: "SHIELD CAP", base: 50, growth: 2.5, max: 3 },
        magnet: { name: "MAGNET TIME", base: 30, growth: 1.6, max: 10 },
        watch:  { name: "TIME FREEZE", base: 60, growth: 1.8, max: 10 },
        blast:  { name: "BEAM WIDTH", base: 45, growth: 1.7, max: 10 }
    };

    let shards = parseInt(localStorage.getItem('nsw_shards')) || 0;
    let highScore = parseInt(localStorage.getItem('nsw_hs')) || 0;
    let levels = JSON.parse(localStorage.getItem('nsw_lvls')) || { shield: 0, magnet: 0, watch: 0, blast: 0 };

    function saveGame() {
        localStorage.setItem('nsw_shards', shards);
        localStorage.setItem('nsw_hs', highScore);
        localStorage.setItem('nsw_lvls', JSON.stringify(levels));
    }

    // UI Elements
    const screens = {
        'mainMenuScreen': document.getElementById('mainMenuScreen'),
        'howToPlayScreen': document.getElementById('howToPlayScreen'),
        'optionsScreen': document.getElementById('optionsScreen'),
        'devToolsScreen': document.getElementById('devToolsScreen'),
        'gameOverScreen': document.getElementById('gameOverScreen'),
        'shopScreen': document.getElementById('shopScreen')
    };
    const bossWarning = document.getElementById('bossWarning');
    const finalScoreText = document.getElementById('finalScoreText');

    // --- STATE VARIABLES ---
    let gameState = 'MENU';
    let isMuted = false;
    let showBgStars = true;
    let isBossRushMode = false;
    let shake = 0;
    
    let secretClicks = 0;
    let isInvincible = false;

    // --- PIXEL ART DATA (RESTORED & EXPANDED) ---
    const colors = {
        'tr': 'transparent', 'bl': '#000000', 'wh': '#ffffff', 'sk': '#e0e0e0', 
        'pu': '#6a31a1', 'dp': '#3e1a5f', 'go': '#ffd700', 'or': '#ffa500', 
        'rd': '#ff4444', 'dr': '#8b0000', 'be': '#333333', 'cy': '#00ffff', 'dc': '#008b8b',
        'lg': '#32cd32', 'dg': '#006400', 'vi': '#8a2be2', 'gy': '#a9a9a9',
        'mg': '#ff00ff', 'ng': '#39ff14', 'lb': '#33ccff', 'bk': '#000000'
    };

    const wizardSprite = [['tr','tr','tr','tr','tr','pu','pu','pu','tr','tr','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','pu','pu','pu','pu','pu','tr','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','pu','pu','pu','pu','pu','pu','pu','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','tr','sk','sk','sk','tr','tr','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','sk','bl','sk','bl','sk','tr','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','sk','sk','be','sk','sk','tr','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','be','be','be','be','be','be','be','tr','tr','tr','tr','tr','tr'],['tr','tr','pu','pu','pu','pu','pu','pu','pu','pu','pu','tr','tr','tr','tr','tr'],['tr','pu','pu','pu','pu','pu','pu','pu','pu','pu','pu','pu','tr','tr','tr','tr'],['tr','pu','pu','pu','pu','pu','pu','pu','pu','pu','pu','pu','tr','tr','tr','tr'],['tr','pu','dp','pu','pu','pu','pu','pu','pu','pu','dp','pu','tr','tr','tr','tr'],['tr','pu','dp','pu','pu','pu','pu','pu','pu','pu','dp','pu','tr','tr','tr','tr'],['tr','tr','tr','dp','dp','dp','dp','dp','dp','dp','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','bl','bl','tr','tr','bl','bl','tr','tr','tr','tr','tr','tr','tr']];
    const starSprite = [['tr','tr','tr','tr','tr','tr','tr','go','tr','tr','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','tr','tr','go','go','go','tr','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','tr','go','go','or','go','go','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','go','go','or','or','or','go','go','tr','tr','tr','tr','tr'],['go','go','go','go','go','or','or','wh','or','or','go','go','go','go','go','tr'],['tr','go','go','or','or','or','wh','wh','wh','or','or','or','go','go','tr','tr'],['tr','tr','go','go','or','or','or','wh','or','or','or','go','go','tr','tr','tr'],['tr','tr','tr','go','go','or','or','or','or','or','go','go','tr','tr','tr','tr'],['tr','tr','tr','go','go','or','or','or','or','or','go','go','tr','tr','tr','tr'],['tr','tr','go','go','go','or','or','or','or','or','go','go','go','tr','tr','tr'],['tr','go','go','go','tr','go','go','go','go','go','tr','go','go','go','tr','tr'],['go','go','tr','tr','tr','tr','tr','tr','tr','tr','tr','tr','tr','go','go','tr']];
    const skullSprite = [['tr','tr','tr','tr','sk','sk','sk','sk','sk','sk','tr','tr','tr','tr','tr','tr'],['tr','tr','sk','sk','sk','sk','sk','sk','sk','sk','sk','sk','tr','tr','tr','tr'],['tr','sk','sk','sk','sk','sk','sk','sk','sk','sk','sk','sk','sk','tr','tr','tr'],['tr','sk','sk','bl','bl','sk','sk','sk','bl','bl','sk','sk','sk','tr','tr','tr'],['tr','sk','bl','bl','bl','bl','sk','bl','bl','bl','bl','sk','sk','tr','tr','tr'],['tr','sk','bl','bl','bl','bl','sk','bl','bl','bl','bl','sk','sk','tr','tr','tr'],['tr','sk','sk','bl','bl','sk','sk','sk','bl','bl','sk','sk','sk','tr','tr','tr'],['tr','tr','sk','sk','sk','sk','rd','rd','sk','sk','sk','sk','tr','tr','tr','tr'],['tr','tr','tr','sk','sk','rd','rd','rd','rd','sk','sk','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','sk','sk','sk','sk','sk','sk','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','sk','bl','sk','bl','sk','bl','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','sk','bl','sk','bl','sk','bl','tr','tr','tr','tr','tr','tr']];
    const shardSprite = [['tr','tr','mg','mg','tr','tr'],['tr','mg','wh','wh','mg','tr'],['mg','wh','wh','wh','wh','mg'],['mg','wh','wh','wh','wh','mg'],['tr','mg','wh','wh','mg','tr'],['tr','tr','mg','mg','tr','tr']];
    const watchSprite = [['tr','tr','go','go','go','go','tr','tr'],['tr','go','cy','wh','wh','cy','go','tr'],['go','cy','wh','bl','bl','wh','cy','go'],['tr','go','cy','cy','cy','cy','go','tr']];
    
    // Additional Bestiary/Item Assets [cite: 25, 27, 29]
    const phantomSprite = [['tr','tr','tr','tr','dp','dp','dp','dp','dp','dp','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','dp','dp','dp','dp','dp','dp','dp','dp','tr','tr','tr','tr','tr'],['tr','tr','dp','dp','dp','rd','rd','dp','dp','rd','rd','dp','tr','tr','tr','tr'],['tr','dp','dp','dp','dp','cy','wh','dp','dp','cy','wh','dp','dp','tr','tr','tr'],['tr','dp','dp','dp','dp','dp','dp','dp','dp','dp','dp','dp','dp','tr','tr','tr'],['tr','dp','dp','dp','dp','dr','dr','dr','dr','dr','dp','dp','dp','tr','tr','tr'],['tr','dp','dp','dp','dp','dp','dp','dp','dp','dp','dp','dp','dp','tr','tr','tr'],['tr','dp','dp','dp','dp','dp','dp','dp','dp','dp','dp','dp','dp','tr','tr','tr'],['tr','tr','dp','dp','tr','dp','dp','tr','dp','dp','tr','dp','dp','tr','tr','tr'],['tr','tr','dp','tr','tr','tr','dp','tr','tr','dp','tr','tr','dp','tr','tr','tr']];
    const specterSprite = [['tr','tr','tr','tr','tr','wh','wh','wh','wh','tr','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','wh','wh','wh','wh','wh','wh','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','wh','wh','cy','wh','wh','cy','wh','wh','tr','tr','tr','tr','tr'],['tr','tr','tr','wh','wh','bl','wh','wh','bl','wh','wh','tr','tr','tr','tr','tr'],['tr','tr','tr','wh','wh','wh','wh','wh','wh','wh','wh','tr','tr','tr','tr','tr'],['tr','tr','tr','wh','wh','wh','wh','wh','wh','wh','wh','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','wh','wh','wh','wh','wh','wh','wh','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','wh','tr','wh','wh','tr','wh','wh','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','wh','tr','tr','wh','tr','tr','wh','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','tr','tr','tr','wh','tr','tr','tr','tr','tr','tr','tr','tr']];
    const cometSprite = [['tr','tr','tr','tr','tr','tr','tr','rd','tr','tr','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','tr','tr','or','or','or','tr','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','tr','tr','tr','or','tr','tr','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','tr','tr','go','go','go','tr','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','tr','go','go','wh','go','go','tr','tr','tr','tr','tr','tr'],['tr','tr','tr','tr','go','go','wh','wh','wh','go','go','tr','tr','tr','tr','tr'],['go','go','go','go','go','wh','wh','wh','wh','wh','go','go','go','go','go','tr'],['tr','go','go','or','or','or','wh','wh','wh','or','or','or','go','go','tr','tr'],['tr','tr','go','go','or','or','or','wh','or','or','or','go','go','tr','tr','tr'],['tr','tr','tr','go','go','or','or','or','or','or','go','go','tr','tr','tr','tr'],['tr','tr','go','go','go','or','or','or','or','or','go','go','go','tr','tr','tr'],['tr','go','go','go','tr','go','go','go','go','go','tr','go','go','go','tr','tr'],['go','go','tr','tr','tr','tr','tr','tr','tr','tr','tr','tr','tr','go','go','tr']];
    
    // Boss Sprites [cite: 31]
    const dragonSprite = [['tr','tr','dr','dr','tr','tr','tr','tr','tr','tr','tr','tr','dr','dr','tr','tr'],['tr','tr','tr','dr','dr','tr','tr','tr','tr','tr','tr','dr','dr','tr','tr','tr'],['tr','tr','tr','tr','dr','dr','dr','dr','dr','dr','dr','dr','tr','tr','tr','tr'],['tr','tr','tr','dr','rd','rd','rd','rd','rd','rd','rd','rd','dr','tr','tr','tr'],['tr','tr','dr','rd','go','go','rd','rd','rd','rd','go','go','rd','dr','tr','tr'],['tr','dr','rd','go','bl','bl','go','rd','rd','go','bl','bl','go','rd','dr','tr'],['dr','rd','rd','go','go','go','go','rd','rd','go','go','go','go','rd','rd','dr'],['dr','rd','rd','rd','rd','rd','rd','rd','rd','rd','rd','rd','rd','rd','rd','dr'],['dr','rd','rd','rd','rd','rd','bl','bl','bl','bl','rd','rd','rd','rd','rd','dr'],['tr','dr','rd','rd','rd','bl','wh','wh','wh','wh','bl','rd','rd','rd','dr','tr'],['tr','tr','dr','dr','dr','bl','wh','bl','bl','wh','bl','dr','dr','dr','tr','tr'],['tr','tr','tr','tr','tr','dr','bl','bl','bl','bl','dr','tr','tr','tr','tr','tr']];
    const eyeSprite = [['tr','tr','tr','tr','vi','vi','vi','vi','vi','vi','vi','vi','tr','tr','tr','tr'],['tr','tr','vi','vi','vi','vi','bk','bk','bk','bk','vi','vi','vi','vi','tr','tr'],['tr','vi','vi','vi','bk','bk','cy','cy','cy','cy','bk','bk','vi','vi','vi','tr'],['tr','vi','vi','bk','bk','cy','wh','wh','cy','cy','cy','bk','bk','vi','vi','tr'],['vi','vi','bk','bk','cy','wh','wh','cy','bk','bk','cy','cy','bk','bk','vi','vi'],['vi','vi','bk','cy','cy','cy','cy','bk','bk','bk','bk','cy','cy','bk','vi','vi'],['vi','vi','bk','cy','cy','cy','cy','bk','bk','bk','bk','cy','cy','bk','vi','vi'],['vi','vi','bk','bk','cy','cy','cy','bk','bk','bk','cy','cy','bk','bk','vi','vi'],['tr','vi','vi','bk','bk','cy','cy','cy','cy','cy','cy','bk','bk','vi','vi','tr'],['tr','vi','vi','vi','bk','bk','cy','cy','cy','cy','bk','bk','vi','vi','vi','tr'],['tr','tr','vi','vi','vi','vi','bk','bk','bk','bk','vi','vi','vi','vi','tr','tr'],['tr','tr','tr','tr','vi','vi','vi','vi','vi','vi','vi','vi','tr','tr','tr','tr']];
    const bossSprites = [dragonSprite, eyeSprite];

    // --- GAME CONSTANTS ---
    const V_WIDTH = 320;
    const V_HEIGHT = 480;
    const NORMAL_SPEED = 300;

    let score = 0;
    let mouseX = V_WIDTH / 2;
    
    const player = { x: 144, y: 410, w: 32, h: 32, speed: NORMAL_SPEED, curShields: 0 };

    let items = [], particles = [], fires = [], bgStars = [], bgFar = [];
    let timers = { magnet: 0, watch: 0, blast: 0, rocket: 0 };
    let spawnTimer = 0, lastTime = performance.now();
    let comboMult = 1, comboTimer = 0, baseSpeed = 150; 
    let bossActive = false, boss = { active: false, hp: 5, maxHp: 5, x: 128, y: -80, dir: 1, type: 0, attackTimer: 0 };

    // Initialize Parallax Stars 
    for(let i=0; i<30; i++) {
        bgStars.push({ x: Math.random()*V_WIDTH, y: Math.random()*V_HEIGHT, sz: Math.random()*2, spd: Math.random()*20+10 });
        bgFar.push({ x: Math.random()*V_WIDTH, y: Math.random()*V_HEIGHT, sz: 1, spd: Math.random()*5+2 });
    }

    // --- AUDIO ---
    let audioCtx = null;
    function playSnd(f, type='sine', d=0.1) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (isMuted) return;
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
    }

    // --- UI CONTROLS ---
    function switchScreen(id) {
        Object.values(screens).forEach(s => s.style.display = 'none');
        if(id) screens[id].style.display = 'flex';
        if(id === 'mainMenuScreen') {
            document.getElementById('mainShards').innerText = shards;
            document.getElementById('menuHS').innerText = highScore;
        }
    }

    function registerSecretClick() { secretClicks++; if(secretClicks >= 5) { switchScreen('devToolsScreen'); secretClicks = 0; } }
    function toggleMute() { isMuted = document.getElementById('muteToggle').checked; }
    function toggleBg() { showBgStars = document.getElementById('bgToggle').checked; }
    function toggleInvincibility() { isInvincible = document.getElementById('invincibilityToggle').checked; }

    // --- CORE GRAPHICS ---
    function drawS(s, x, y, sz) {
        let ps = sz / s[0].length;
        for(let r=0; r<s.length; r++) {
            for(let cIdx=0; cIdx<s[r].length; cIdx++) {
                if(s[r][cIdx]!='tr'){
                    ctx.fillStyle=colors[s[r][cIdx]];
                    ctx.fillRect(x+cIdx*ps, y+r*ps, ps+0.5, ps+0.5);
                }
            }
        }
    }

    function resize() {
        const s = Math.min(window.innerWidth / V_WIDTH, window.innerHeight / V_HEIGHT);
        canvas.width = V_WIDTH * s; canvas.height = V_HEIGHT * s; ctx.scale(s, s);
    }
    window.addEventListener('resize', resize); resize();

    function updatePointerPosition(clientX) {
        const rect = canvas.getBoundingClientRect();
        mouseX = (clientX - rect.left) * (V_WIDTH / rect.width) - 16;
    }
    window.addEventListener('mousemove', e => updatePointerPosition(e.clientX));
    canvas.addEventListener('touchmove', e => { updatePointerPosition(e.touches[0].clientX); e.preventDefault(); }, {passive: false});

    // --- LOGIC ---
    function spawn() {
        if(boss.active) return;
        let r = Math.random(), type = 'skull', sprite = skullSprite, w=24, h=24, spd=120 + score/50;
        if(r > 0.98) { type='shard'; sprite=shardSprite; w=16; h=16; } // Arcane Shard
        else if(r > 0.94) { type='watch'; sprite=watchSprite; w=16; h=16; } // Stopwatch
        else if(r > 0.90) { type='magnet'; sprite=watchSprite; w=16; h=16; } // Magnet (reuse watch)
        else if(r > 0.85 && score > 800) { type='phantom'; sprite=phantomSprite; spd*=1.4; } 
        else if(r > 0.60) { type='star'; sprite=starSprite; }
        items.push({ x: Math.random()*290, y: -30, w, h, type, sprite, speed: spd });
    }

    function startGame(rush = false) {
        isBossRushMode = rush; gameState = 'PLAYING'; score = 0; sessionShards = 0; items = []; fires = [];
        player.x = 144; player.curShields = levels.shield; // Starts with Level based Shields
        timers = { magnet: 0, watch: 0, blast: 0, rocket: 0 };
        boss.active = rush; boss.hp = 5 + (rush?5:0); boss.y = -80;
        document.querySelectorAll('.overlay-screen').forEach(s => s.style.display = 'none');
        document.getElementById('newRecordText').style.display = 'none';
        lastTime = performance.now();
    }

    function update(t) {
        let dt = (t - lastTime)/1000 || 0.016; lastTime = t;
        if(gameState !== 'PLAYING') { render(); requestAnimationFrame(update); return; }

        let eDt = (timers.watch > 0) ? 0 : dt;
        Object.keys(timers).forEach(k => { if(timers[k]>0) timers[k]-=dt; });
        if(shake > 0) shake -= dt;

        spawnTimer += dt; if(spawnTimer > 0.8) { spawn(); spawnTimer = 0; }
        player.x += (mouseX - player.x) * 12 * dt;

        items.forEach((it, i) => {
            let curDt = (['star', 'shard', 'magnet', 'watch'].includes(it.type)) ? dt : eDt;
            it.y += it.speed * curDt;

            // Tiered Magnet Power [cite: 21]
            if(timers.magnet > 0 && (it.type=='star' || it.type=='shard')) {
                it.x += (player.x - it.x) * (4 + levels.magnet) * dt;
            }

            if(Math.abs(player.x - it.x) < 22 && Math.abs(player.y - it.y) < 22) {
                if(!isInvincible && (it.type === 'skull' || it.type === 'phantom')) {
                    if(player.curShields > 0) { player.curShields--; items.splice(i,1); shake=0.2; playSnd(150, 'square'); }
                    else { endG(); }
                } else {
                    if(it.type=='star') score += 10;
                    if(it.type=='shard') sessionShards++;
                    if(it.type=='magnet') timers.magnet = 5 + (levels.magnet * 1.5);
                    if(it.type=='watch') timers.watch = 3 + levels.watch; // Tiered Freeze 
                    items.splice(i,1); playSnd(880);
                }
            }
            if(it.y > 500) items.splice(i, 1);
        });

        render(); requestAnimationFrame(update);
    }

    function endG() {
        gameState = 'MENU'; shards += sessionShards; 
        let isNew = score > highScore; if(isNew) { highScore = score; document.getElementById('newRecordText').style.display = 'block'; }
        saveGame();
        document.getElementById('finalScoreText').innerText = `SCORE: ${score}`;
        document.getElementById('earnedShardsText').innerText = `FOUND ${sessionShards} SHARDS`;
        switchScreen('gameOverScreen');
    }

    function render() {
        ctx.clearRect(0,0,V_WIDTH,V_HEIGHT);
        if(shake > 0) ctx.translate(Math.random()*6-3, Math.random()*6-3); // Screen Shake 
        
        // Parallax 
        bgFar.forEach(p => { ctx.fillStyle='#000044'; ctx.fillRect(p.x, (p.y+=0.5)%V_HEIGHT, 1, 1); });
        bgStars.forEach(p => { ctx.fillStyle='#ffffff33'; ctx.fillRect(p.x, (p.y+=2)%V_HEIGHT, 2, 2); });

        // Player & Shields
        for(let i=0; i<player.curShields; i++) { 
            ctx.strokeStyle='#00ffff'; ctx.strokeRect(player.x-4-i*4, player.y-4-i*4, 40+i*8, 40+i*8); 
        }
        drawS(wizardSprite, player.x, player.y, 32);
        
        items.forEach(it => drawS(it.sprite, it.x, it.y, it.w));

        if(gameState=='PLAYING') {
            ctx.fillStyle='#fff'; ctx.font="8px 'Press Start 2P'";
            ctx.fillText(`SCORE: ${score}`, 10, 20);
            ctx.fillText(`✧: ${sessionShards}`, 10, 35);
        }
        ctx.setTransform(1,0,0,1,0,0);
    }

    // --- SHOP UI (v5.1 Tiered Upgrades) ---
    function updateShopUI() {
        document.getElementById('shopShards').innerText = shards;
        const list = document.getElementById('shopList'); list.innerHTML = '';
        Object.keys(UPGRADE_CONFIG).forEach(key => {
            const conf = UPGRADE_CONFIG[key], lvl = levels[key], cost = Math.floor(conf.base * Math.pow(conf.growth, lvl));
            const isMax = lvl >= conf.max;
            list.innerHTML += `<div class="shop-item"><div class="shop-header"><span class="item-name">${conf.name}</span><span class="item-lvl">LVL ${lvl}</span></div><div class="item-cost">${isMax?'MAX':'COST: '+cost}</div><button onclick="buyUpgrade('${key}',${cost})" ${isMax||shards<cost?'disabled':''}>UPGRADE</button></div>`;
        });
    }

    function buyUpgrade(k, cost) { if(shards >= cost) { shards-=cost; levels[k]++; saveGame(); updateShopUI(); playSnd(660); } }

    requestAnimationFrame(update); switchScreen('mainMenuScreen');
</script>
</body>
