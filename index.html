<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Night Shift Wizard: Arcane Overdrive</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111118;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            border: 4px solid #333;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            background: linear-gradient(to bottom, #050510 0%, #111128 100%);
            cursor: none; /* Hides cursor over the game area */
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .game-over-screen {
            display: none;
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            pointer-events: auto;
            border: 2px solid #5d275d;
            border-radius: 8px;
        }

        button {
            background-color: #5d275d;
            color: white;
            border: 2px solid #8a3a8a;
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 15px;
            font-family: inherit;
            text-transform: uppercase;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover { background-color: #8a3a8a; }
        button:active { background-color: #d15cd1; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="gameOverScreen" class="game-over-screen">
                <h1 style="color: #ff4444; margin: 0 0 10px 0;">CURSED!</h1>
                <p id="finalScoreText" style="font-size: 1.2rem; margin: 0;">Score: 0</p>
                <button onclick="resetGame()">RETRY</button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreText = document.getElementById('finalScoreText');

    // --- PIXEL ART DATA ---
    const colors = {
        'tr': 'transparent', 
        'bl': '#000000', 'wh': '#ffffff', 'sk': '#e0e0e0', 
        'pu': '#6a31a1', 'dp': '#3e1a5f', 'go': '#ffd700', 
        'or': '#ffa500', 'rd': '#ff4444', 'dr': '#8b0000', 
        'be': '#333333', 'cy': '#00ffff', 'dc': '#008b8b'
    };

    const wizardSprite = [
        ['tr','tr','tr','tr','tr','pu','pu','pu','tr','tr','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','pu','pu','pu','pu','pu','tr','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','pu','pu','pu','pu','pu','pu','pu','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','tr','sk','sk','sk','tr','tr','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','sk','bl','sk','bl','sk','tr','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','sk','sk','be','sk','sk','tr','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','be','be','be','be','be','be','be','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','pu','pu','pu','pu','pu','pu','pu','pu','pu','tr','tr','tr','tr','tr'],
        ['tr','pu','pu','pu','pu','pu','pu','pu','pu','pu','pu','pu','tr','tr','tr','tr'],
        ['tr','pu','pu','pu','pu','pu','pu','pu','pu','pu','pu','pu','tr','tr','tr','tr'],
        ['tr','pu','dp','pu','pu','pu','pu','pu','pu','pu','dp','pu','tr','tr','tr','tr'],
        ['tr','pu','dp','pu','pu','pu','pu','pu','pu','pu','dp','pu','tr','tr','tr','tr'],
        ['tr','tr','tr','dp','dp','dp','dp','dp','dp','dp','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','bl','bl','tr','tr','bl','bl','tr','tr','tr','tr','tr','tr','tr']
    ];

    const starSprite = [
        ['tr','tr','tr','tr','tr','tr','tr','go','tr','tr','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','tr','tr','go','go','go','tr','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','tr','go','go','or','go','go','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','go','go','or','or','or','go','go','tr','tr','tr','tr','tr'],
        ['go','go','go','go','go','or','or','wh','or','or','go','go','go','go','go','tr'],
        ['tr','go','go','or','or','or','wh','wh','wh','or','or','or','go','go','tr','tr'],
        ['tr','tr','go','go','or','or','or','wh','or','or','or','go','go','tr','tr','tr'],
        ['tr','tr','tr','go','go','or','or','or','or','or','go','go','tr','tr','tr','tr'],
        ['tr','tr','tr','go','go','or','or','or','or','or','go','go','tr','tr','tr','tr'],
        ['tr','tr','go','go','go','or','or','or','or','or','go','go','go','tr','tr','tr'],
        ['tr','go','go','go','tr','go','go','go','go','go','tr','go','go','go','tr','tr'],
        ['go','go','tr','tr','tr','tr','tr','tr','tr','tr','tr','tr','tr','go','go','tr']
    ];

    const skullSprite = [
        ['tr','tr','tr','tr','sk','sk','sk','sk','sk','sk','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','sk','sk','sk','sk','sk','sk','sk','sk','sk','sk','tr','tr','tr','tr'],
        ['tr','sk','sk','sk','sk','sk','sk','sk','sk','sk','sk','sk','sk','tr','tr','tr'],
        ['tr','sk','sk','bl','bl','sk','sk','sk','bl','bl','sk','sk','sk','tr','tr','tr'],
        ['tr','sk','bl','bl','bl','bl','sk','bl','bl','bl','bl','sk','sk','tr','tr','tr'],
        ['tr','sk','bl','bl','bl','bl','sk','bl','bl','bl','bl','sk','sk','tr','tr','tr'],
        ['tr','sk','sk','bl','bl','sk','sk','sk','bl','bl','sk','sk','sk','tr','tr','tr'],
        ['tr','tr','sk','sk','sk','sk','rd','rd','sk','sk','sk','sk','tr','tr','tr','tr'],
        ['tr','tr','tr','sk','sk','rd','rd','rd','rd','sk','sk','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','sk','sk','sk','sk','sk','sk','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','sk','bl','sk','bl','sk','bl','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','sk','bl','sk','bl','sk','bl','tr','tr','tr','tr','tr','tr']
    ];

    const cometSprite = [
        ['tr','tr','tr','tr','tr','tr','tr','rd','tr','tr','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','tr','tr','or','or','or','tr','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','tr','tr','tr','or','tr','tr','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','tr','tr','go','go','go','tr','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','tr','go','go','wh','go','go','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','go','go','wh','wh','wh','go','go','tr','tr','tr','tr','tr'],
        ['go','go','go','go','go','wh','wh','wh','wh','wh','go','go','go','go','go','tr'],
        ['tr','go','go','or','or','or','wh','wh','wh','or','or','or','go','go','tr','tr'],
        ['tr','tr','go','go','or','or','or','wh','or','or','or','go','go','tr','tr','tr'],
        ['tr','tr','tr','go','go','or','or','or','or','or','go','go','tr','tr','tr','tr'],
        ['tr','tr','go','go','go','or','or','or','or','or','go','go','go','tr','tr','tr'],
        ['tr','go','go','go','tr','go','go','go','go','go','tr','go','go','go','tr','tr'],
        ['go','go','tr','tr','tr','tr','tr','tr','tr','tr','tr','tr','tr','go','go','tr']
    ];

    const potionSprite = [
        ['tr','tr','tr','tr','tr','tr','wh','wh','tr','tr','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','tr','bl','or','or','bl','tr','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','tr','bl','or','or','bl','tr','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','tr','bl','wh','wh','bl','tr','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','tr','bl','cy','cy','cy','cy','bl','tr','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','bl','cy','cy','wh','cy','cy','cy','bl','tr','tr','tr','tr','tr'],
        ['tr','tr','tr','bl','cy','wh','cy','cy','dc','cy','bl','tr','tr','tr','tr','tr'],
        ['tr','tr','bl','cy','cy','cy','cy','dc','dc','cy','cy','bl','tr','tr','tr','tr'],
        ['tr','tr','bl','cy','cy','cy','dc','dc','dc','cy','cy','bl','tr','tr','tr','tr'],
        ['tr','tr','bl','cy','cy','cy','cy','cy','cy','cy','cy','bl','tr','tr','tr','tr'],
        ['tr','tr','tr','bl','bl','bl','bl','bl','bl','bl','bl','tr','tr','tr','tr','tr']
    ];

    // --- GAME SETTINGS & OVERDRIVE VARIABLES ---
    const V_WIDTH = 320;
    const V_HEIGHT = 480;
    let score = 0;
    let isGameOver = false;
    let mouseX = V_WIDTH / 2;

    const player = {
        x: V_WIDTH / 2 - 16,
        y: V_HEIGHT - 60,
        w: 32,
        h: 32,
        speed: 300, // Pixels per second for smooth mouse snapping
        hasShield: false
    };

    let items = [];
    let particles = [];
    let spawnTimer = 0;
    
    let lastTime = performance.now();
    let comboMult = 1;
    let comboTimer = 0;
    let baseSpeed = 100; // Base falling speed in pixels per second

    // --- PROCEDURAL AUDIO ---
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    
    // Ensure audio unlocks on first user interaction
    window.addEventListener('mousedown', initAudio, {once:true});
    window.addEventListener('touchstart', initAudio, {once:true});
    window.addEventListener('keydown', initAudio, {once:true});

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); 
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        
        if (type === 'bloop') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
            gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'chime') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(880, now + 0.1);
            gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'crunch') {
            osc.type = 'square'; osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
            gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        }
    }

    // --- UTILS ---
    function drawPixelSprite(sprite, x, y, size) {
        const pixelSize = size / 16;
        for (let r = 0; r < sprite.length; r++) {
            for (let c = 0; c < sprite[r].length; c++) {
                const colorKey = sprite[r][c];
                if (colorKey !== 'tr') {
                    ctx.fillStyle = colors[colorKey];
                    // +0.5 to prevent gap bleeding
                    ctx.fillRect(x + (c * pixelSize), y + (r * pixelSize), pixelSize + 0.5, pixelSize + 0.5);
                }
            }
        }
    }

    function resize() {
        const scale = Math.min(window.innerWidth / V_WIDTH, window.innerHeight / V_HEIGHT);
        canvas.width = V_WIDTH * scale;
        canvas.height = V_HEIGHT * scale;
        ctx.scale(scale, scale);
    }
    window.addEventListener('resize', resize);
    resize();

    // --- INPUT HANDLING ---
    function updatePointerPosition(clientX) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = V_WIDTH / rect.width;
        mouseX = (clientX - rect.left) * scaleX - (player.w / 2);
    }

    window.addEventListener('mousemove', e => {
        updatePointerPosition(e.clientX);
    });

    canvas.addEventListener('touchstart', e => {
        updatePointerPosition(e.touches[0].clientX);
        e.preventDefault();
    }, {passive: false});

    canvas.addEventListener('touchmove', e => {
        updatePointerPosition(e.touches[0].clientX);
        e.preventDefault();
    }, {passive: false});

    // --- LOGIC ---
    function spawnItem() {
        const rand = Math.random();
        let type = 'skull', sprite = skullSprite, w = 24, h = 24, sBase = 110, col = '#8b0000';

        if (rand > 0.95) { type = 'potion'; sprite = potionSprite; sBase = 120; col = '#00ffff'; } 
        else if (rand > 0.85) { type = 'comet'; sprite = cometSprite; w = 28; h = 28; sBase = 220; col = '#ffd700'; } 
        else if (rand > 0.5) { type = 'star'; sprite = starSprite; sBase = 100; col = '#ffffff'; }

        items.push({
            x: Math.random() * (V_WIDTH - w), y: -30, w: w, h: h, 
            type: type, sprite: sprite, speed: sBase * (baseSpeed / 100), color: col
        });
    }

    function spawnParticles(x, y, color) {
        for(let i=0; i<8; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 100 + 50;
            particles.push({ 
                x: x, y: y, 
                vx: Math.cos(angle) * speed, 
                vy: Math.sin(angle) * speed, 
                life: 0.5, 
                color: color 
            });
        }
    }

    function resetGame() {
        score = 0;
        items = [];
        particles = [];
        isGameOver = false;
        player.x = V_WIDTH / 2 - 16;
        mouseX = V_WIDTH / 2;
        player.hasShield = false;
        comboMult = 1;
        comboTimer = 0;
        baseSpeed = 100;
        
        gameOverScreen.style.display = 'none';
        lastTime = performance.now(); // Reset time to avoid massive delta jumps
        requestAnimationFrame(update);
    }

    // --- MAIN GAME LOOP ---
    function update(timestamp) {
        if (isGameOver) return;
        
        // Calculate Delta Time
        let dt = (timestamp - lastTime) / 1000 || 0.016; 
        if (dt > 0.1) dt = 0.1; // Cap dt for lag spikes
        lastTime = timestamp;

        // Smoothly move wizard towards mouse position
        player.x += (mouseX - player.x) * (player.speed/50) * dt;
        
        // Screen constraints
        if (player.x < 0) player.x = 0;
        if (player.x > V_WIDTH - player.w) player.x = V_WIDTH - player.w;

        // Combo Timer Logic
        if (comboTimer > 0) {
            comboTimer -= dt;
            if (comboTimer <= 0) comboMult = 1; // Reset combo if time runs out
        }

        // Spawn Spacing
        spawnTimer += dt;
        if (spawnTimer > Math.max(0.4, 1.2 - (score / 5000))) {
            spawnItem();
            spawnTimer = 0;
        }

        // Item Movement & Collision
        for (let i = items.length - 1; i >= 0; i--) {
            let item = items[i];
            item.y += item.speed * dt;

            // Hitboxes: magnetic for good items (-6 padding), forgiving for skulls (+6 padding)
            let hitPad = (item.type === 'skull') ? 6 : -6;
            let hit = { 
                x: item.x + hitPad, 
                y: item.y + hitPad, 
                w: item.w - (hitPad * 2), 
                h: item.h - (hitPad * 2) 
            };

            // AABB Collision Detection
            if (player.x < hit.x + hit.w && player.x + player.w > hit.x &&
                player.y < hit.y + hit.h && player.y + player.h > hit.y) {
                
                if (item.type === 'skull') {
                    if (player.hasShield) {
                        player.hasShield = false;
                        playSound('crunch');
                        spawnParticles(item.x + item.w/2, item.y + item.h/2, '#00ffff');
                        items.splice(i, 1);
                    } else {
                        playSound('crunch');
                        endGame();
                        return;
                    }
                } else {
                    // Collect Good Item
                    if (item.type === 'star') score += 10 * comboMult;
                    if (item.type === 'comet') score += 50 * comboMult;
                    
                    if (item.type === 'potion') { 
                        player.hasShield = true; 
                        playSound('chime'); 
                    } else { 
                        playSound('bloop'); 
                        comboMult++;
                        comboTimer = 3.0; // 3 seconds to keep combo
                        baseSpeed += 2; // Increase falling speed slightly
                    }
                    
                    spawnParticles(item.x + item.w/2, item.y + item.h/2, item.color);
                    items.splice(i, 1);
                }
                continue;
            }
            // Remove items off-screen
            if (item.y > V_HEIGHT) items.splice(i, 1);
        }

        // Particle Updates
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx * dt; 
            p.y += p.vy * dt;
            p.vx *= 0.9; // Add friction
            p.vy *= 0.9;
            p.life -= dt;
            if (p.life <= 0) particles.splice(i, 1);
        }

        render();
        requestAnimationFrame(update);
    }

    function endGame() {
        isGameOver = true;
        gameOverScreen.style.display = 'block';
        finalScoreText.innerText = `Final Score: ${score}`;
    }

    function render() {
        ctx.clearRect(0, 0, V_WIDTH, V_HEIGHT);

        // Draw Player Shield (Arcane bubble)
        if (player.hasShield) {
            ctx.beginPath();
            ctx.arc(player.x + player.w/2, player.y + player.h/2, player.w/1.4, 0, Math.PI * 2);
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // Draw Wizard
        drawPixelSprite(wizardSprite, player.x, player.y, player.w);
        
        // Draw Items
        items.forEach(item => drawPixelSprite(item.sprite, item.x, item.y, item.w));

        // Draw Particles
        particles.forEach(p => {
            ctx.fillStyle = p.color; 
            ctx.globalAlpha = Math.max(0, p.life / 0.5);
            ctx.fillRect(p.x, p.y, 4, 4);
        });
        ctx.globalAlpha = 1.0;

        // Draw UI
        ctx.fillStyle = "#fff";
        ctx.font = "bold 16px 'Courier New'";
        ctx.textAlign = "left";
        ctx.shadowColor = "rgba(0, 0, 0, 0.8)";
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;
        ctx.shadowBlur = 2;
        
        ctx.fillText(`SCORE: ${score}`, 10, 25);
        
        // Draw Combo Text
        if (comboMult > 1) {
            ctx.fillStyle = comboMult > 4 ? '#ff4444' : '#ffd700';
            ctx.fillText(`COMBO x${comboMult}`, 10, 45);
        }
        
        ctx.shadowColor = "transparent";
    }

    // Init Frame
    requestAnimationFrame(update);

</script>
</body>
</html>
