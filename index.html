<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Night Shift Wizard: Arcane Overdrive</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; background-color: #0b0b1a; color: #fff;
            font-family: 'Press Start 2P', cursive;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none;
        }

        #game-container {
            position: relative; box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
            border: 4px solid #333; background-color: #050510;
        }

        canvas { display: block; image-rendering: pixelated; cursor: none; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .overlay-screen {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; background: rgba(5, 5, 20, 0.98); padding: 20px;
            pointer-events: auto; border: 2px solid #5d275d; border-radius: 8px;
            width: 85%; max-width: 300px; max-height: 85vh; overflow-y: auto;
        }

        .pixel-title { font-size: 18px; color: #ff00ff; text-shadow: 3px 3px 0px #3e1a5f; margin-bottom: 5px; }
        .currency-display { color: #ff00ff; font-size: 10px; margin-bottom: 15px; }
        .stat-line { font-size: 8px; color: #ffd700; margin-bottom: 10px; }
        
        /* Shop Styling */
        .shop-item {
            width: 100%; background: #1a1a3a; border: 1px solid #5d275d;
            margin: 5px 0; padding: 8px; display: flex; flex-direction: column; align-items: flex-start;
        }
        .shop-item-header { display: flex; justify-content: space-between; width: 100%; font-size: 7px; margin-bottom: 5px; }
        .item-name { color: #39ff14; }
        .item-lvl { color: #00ffff; }
        .item-price { font-size: 7px; color: #ff00ff; margin-bottom: 5px; }

        button {
            background-color: #3e1a5f; color: white; border: 2px solid #8a3a8a; padding: 10px;
            font-size: 8px; cursor: pointer; margin-top: 5px; font-family: inherit;
            width: 100%; text-transform: uppercase;
        }
        button:hover:not(:disabled) { background-color: #6a31a1; transform: scale(1.02); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .boss-warning { display: none; position: absolute; top: 35%; color: #ff4444; font-size: 14px; text-shadow: 2px 2px 0px #000; animation: blink 0.4s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            
            <div id="mainMenu" class="overlay-screen">
                <h1 class="pixel-title">NIGHT SHIFT WIZARD</h1>
                <p style="font-size: 8px; color: #00ffff;">ARCANE OVERDRIVE</p>
                <div class="currency-display">✧ <span id="menuShards">0</span></div>
                <div class="stat-line">HI-SCORE: <span id="menuHS">0</span></div>
                <button onclick="startGame(false)">PLAY ARCADE</button>
                <button onclick="startGame(true)" style="color:#ff4444;">BOSS RUSH</button>
                <button onclick="switchScreen('shopScreen'); updateShopUI();">THE ARMORY</button>
            </div>

            <div id="shopScreen" class="overlay-screen" style="display: none;">
                <h2 style="font-size: 10px; color: #ffd700;">UPGRADES</h2>
                <div class="currency-display">WALLET: <span id="shopShards">0</span> ✧</div>
                <div id="shopList" style="width: 100%;"></div>
                <button onclick="switchScreen('mainMenu')">BACK</button>
            </div>

            <div id="gameOver" class="overlay-screen" style="display: none;">
                <h1 id="goTitle" style="color: #ff4444; font-size: 18px; margin-bottom: 10px;">CURSED!</h1>
                <p id="finalScore" style="font-size: 10px; margin-bottom: 10px;">Score: 0</p>
                <p id="earnedShards" style="font-size: 8px; color: #ff00ff; margin-bottom: 20px;">Found 0 Shards</p>
                <button onclick="startGame(isBossRushMode)">RETRY</button>
                <button onclick="switchScreen('mainMenu')">MENU</button>
            </div>

            <div id="bossWarning" class="boss-warning">BOSS APPROACHING!</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const V_WIDTH = 320, V_HEIGHT = 480;

    // --- PERSISTENCE & BALANCING ---
    const UPGRADE_CONFIG = {
        shield: { name: "SHIELD CAP", base: 50, growth: 2.5, max: 3 },
        magnet: { name: "MAGNET TIME", base: 30, growth: 1.6, max: 10 },
        watch:  { name: "TIME FREEZE", base: 60, growth: 1.8, max: 10 },
        blast:  { name: "ARCANE BEAM", base: 45, growth: 1.7, max: 10 }
    };

    let shards = parseInt(localStorage.getItem('nsw_shards')) || 0;
    let highScore = parseInt(localStorage.getItem('nsw_hs')) || 0;
    let levels = JSON.parse(localStorage.getItem('nsw_lvls')) || { shield: 0, magnet: 0, watch: 0, blast: 0 };

    function save() {
        localStorage.setItem('nsw_shards', shards);
        localStorage.setItem('nsw_lvls', JSON.stringify(levels));
        localStorage.setItem('nsw_hs', highScore);
    }

    // --- GAME ENGINE STATE ---
    let gameState = 'MENU', isBossRushMode = false, score = 0, sessionShards = 0;
    let mouseX = 160, lastTime = 0, spawnTimer = 0, shake = 0;
    let items = [], particles = [], fires = [], bg = [], bgFar = [];
    let player = { x: 144, y: 410, w: 32, h: 32, curShields: 0, speed: 300 };
    let timers = { magnet: 0, watch: 0, blast: 0, rocket: 0 };
    let boss = { active: false, hp: 5, maxHp: 5, y: -80, type: 0, dir: 1, wave: 0, atkTimer: 0 };

    // Pixel Art Colors
    const c = { 'tr': 'transparent', 'p': '#6a31a1', 'd': '#3e1a5f', 'sk': '#e0e0e0', 'bl': '#000000', 'cy': '#00ffff', 'mg': '#ff00ff', 'go': '#ffd700', 'rd': '#ff4444', 'or': '#ffa500', 'wh': '#ffffff' };

    // Sprites
    const wizS = [['tr','tr','p','p','p','tr','tr'],['tr','p','sk','bl','sk','p','tr'],['p','p','p','p','p','p','p'],['tr','p','d','p','d','p','tr'],['tr','tr','bl','tr','bl','tr','tr']];
    const skullS = [['sk','sk','sk'],['sk','bl','sk'],['sk','sk','sk']];
    const starS = [['tr','go','tr'],['go','wh','go'],['tr','go','tr']];
    const shardS = [['mg','wh','mg'],['wh','mg','wh'],['mg','wh','mg']];
    const bossS = [
        [['rd','rd','rd','rd'],['rd','wh','wh','rd'],['rd','rd','rd','rd'],['tr','rd','rd','tr']], // Dragon-ish
        [['cy','cy','cy','cy'],['cy','bl','bl','cy'],['cy','cy','cy','cy'],['tr','cy','cy','tr']]  // Eye-ish
    ];

    // --- AUDIO SYNTH ---
    let audioCtx;
    function playSnd(f, type='sine', d=0.1) {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    // --- RENDER HELPERS ---
    function drawS(s, x, y, sz) {
        let ps = sz / s[0].length;
        for(let r=0; r<s.length; r++) {
            for(let cIdx=0; cIdx<s[r].length; cIdx++) {
                if(s[r][cIdx]!='tr'){
                    ctx.fillStyle=c[s[r][cIdx]];
                    ctx.fillRect(x+cIdx*ps, y+r*ps, ps+0.5, ps+0.5);
                }
            }
        }
    }

    // --- GAME LOGIC ---
    function spawn() {
        if(boss.active) return;
        let r = Math.random(), type = 'skull', sprite = skullS, col = c.rd, spd = 120 + score/40;
        
        if(r > 0.98) { type='shard'; sprite=shardS; col=c.mg; }
        else if(r > 0.95) { type='watch'; sprite=shardS; col=c.go; } 
        else if(r > 0.92) { type='magnet'; sprite=shardS; col=c.mg; }
        else if(r > 0.88 && score > 500) { type='meteor'; sprite=skullS; col=c.or; spd*=1.4; } 
        else if(r > 0.60) { type='star'; sprite=starS; col=c.go; }

        items.push({ x: Math.random()*290, y: -30, w: 24, h: 24, type, sprite, col, speed: spd });
    }

    function startGame(rush) {
        isBossRushMode = rush; gameState = 'PLAYING'; score = 0; sessionShards = 0; items = []; fires = [];
        player.x = 144; player.curShields = levels.shield;
        timers = { magnet: 0, watch: 0, blast: 0, rocket: 0 };
        boss.active = rush; boss.hp = 5 + (rush?5:0); boss.y = -80;
        document.querySelectorAll('.overlay-screen').forEach(s => s.style.display = 'none');
        playSnd(440, 'triangle');
    }

    function update(t) {
        let dt = (t - lastTime)/1000 || 0.016; lastTime = t;
        if(gameState != 'PLAYING') { render(); requestAnimationFrame(update); return; }
        
        let eDt = (timers.watch > 0) ? 0 : dt;
        Object.keys(timers).forEach(k => { if(timers[k]>0) timers[k]-=dt; });
        if(shake > 0) shake -= dt;

        spawnTimer += dt; if(spawnTimer > 0.8) { spawn(); spawnTimer = 0; }
        player.x += (mouseX - player.x) * 12 * dt;

        items.forEach((it, i) => {
            let curDt = (['star', 'shard', 'magnet', 'watch'].includes(it.type)) ? dt : eDt;
            it.y += it.speed * curDt;

            // Magnet Logic
            if(timers.magnet > 0 && (it.type=='star' || it.type=='shard')) {
                it.x += (player.x - it.x) * (4 + levels.magnet) * dt;
            }

            // Collision
            if(Math.abs(player.x - it.x) < 22 && Math.abs(player.y - it.y) < 22) {
                if(['skull', 'meteor'].includes(it.type)) {
                    if(player.curShields > 0) { player.curShields--; items.splice(i,1); shake=0.2; playSnd(150, 'square'); }
                    else { endG(); }
                } else {
                    if(it.type=='star') score += 10;
                    if(it.type=='shard') sessionShards++;
                    if(it.type=='magnet') timers.magnet = 5 + (levels.magnet * 1.5);
                    if(it.type=='watch') timers.watch = 3 + levels.watch;
                    items.splice(i,1); playSnd(880);
                }
            }
            if(it.type=='meteor' && it.y > 430) { fires.push({x: it.x, y: 440, l: 2}); items.splice(i,1); shake=0.1; }
            if(it.y > 500) items.splice(i,1);
        });

        fires.forEach((f, i) => { 
            f.l -= dt; 
            if(Math.abs(player.x - f.x) < 25 && f.l > 0) {
                if(player.curShields > 0) { player.curShields--; f.l = 0; shake=0.2; }
                else { endG(); }
            }
            if(f.l<=0) fires.splice(i,1); 
        });

        render(); requestAnimationFrame(update);
    }

    function endG() {
        gameState = 'MENU'; shards += sessionShards; 
        if(score > highScore) highScore = score; save();
        document.getElementById('finalScore').innerText = `SCORE: ${score}`;
        document.getElementById('earnedShards').innerText = `FOUND ${sessionShards} SHARDS`;
        switchScreen('gameOver');
        playSnd(100, 'sawtooth', 0.4);
    }

    function render() {
        ctx.clearRect(0,0,V_WIDTH,V_HEIGHT);
        if(shake > 0) ctx.translate(Math.random()*6-3, Math.random()*6-3);
        
        // Background Stars
        bgFar.forEach(p => { ctx.fillStyle='#000044'; ctx.fillRect(p.x, (p.y+=0.5)%V_HEIGHT, 1, 1); });
        bg.forEach(p => { ctx.fillStyle='#ffffff33'; ctx.fillRect(p.x, (p.y+=2)%V_HEIGHT, 2, 2); });

        // Player & Shields
        for(let i=0; i<player.curShields; i++) { 
            ctx.strokeStyle=c.cy; ctx.strokeRect(player.x-4-i*4, player.y-4-i*4, 40+i*8, 40+i*8); 
        }
        drawS(wizS, player.x, player.y, 32);
        
        // Entities
        items.forEach(it => drawS(it.sprite, it.x, it.y, it.w));
        fires.forEach(f => { ctx.fillStyle=c.rd; ctx.globalAlpha = f.l/2; ctx.fillRect(f.x, f.y, 32, 12); ctx.globalAlpha=1; });
        
        if(gameState=='PLAYING') {
            ctx.fillStyle='#fff'; ctx.font="8px 'Press Start 2P'";
            ctx.fillText(`SCORE: ${score}`, 10, 20);
            ctx.fillText(`✧: ${sessionShards}`, 10, 35);
            if(timers.watch > 0) { ctx.fillStyle=c.cy; ctx.fillText("STOPWATCH", 10, 50); }
        }
        ctx.setTransform(1,0,0,1,0,0);
    }

    // --- UI & SHOP ---
    function switchScreen(id) {
        document.querySelectorAll('.overlay-screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
        if(id=='mainMenu') {
            document.getElementById('menuShards').innerText = shards;
            document.getElementById('menuHS').innerText = highScore;
        }
    }

    function updateShopUI() {
        document.getElementById('shopShards').innerText = shards;
        const list = document.getElementById('shopList'); list.innerHTML = '';
        Object.keys(UPGRADE_CONFIG).forEach(key => {
            const conf = UPGRADE_CONFIG[key];
            const lvl = levels[key];
            const cost = Math.floor(conf.base * Math.pow(conf.growth, lvl));
            const isMax = lvl >= conf.max;

            list.innerHTML += `
                <div class="shop-item">
                    <div class="shop-item-header">
                        <span class="item-name">${conf.name}</span>
                        <span class="item-lvl">LVL ${lvl}</span>
                    </div>
                    <div class="item-price">${isMax ? 'MAXED' : 'COST: ' + cost + ' ✧'}</div>
                    <button onclick="buyUpgrade('${key}', ${cost})" ${ (isMax || shards < cost) ? 'disabled' : ''}>UPGRADE</button>
                </div>`;
        });
    }

    function buyUpgrade(key, cost) {
        if(shards >= cost) {
            shards -= cost; levels[key]++;
            save(); updateShopUI(); playSnd(660);
        }
    }

    // --- INIT ---
    window.addEventListener('mousemove', e => { 
        let r = canvas.getBoundingClientRect(); 
        mouseX = (e.clientX - r.left) * (V_WIDTH/r.width) - 16; 
    });
    function resize() { 
        let s = Math.min(window.innerWidth/V_WIDTH, window.innerHeight/V_HEIGHT); 
        canvas.width = V_WIDTH*s; canvas.height = V_HEIGHT*s; ctx.scale(s,s); 
    }
    window.addEventListener('resize', resize);
    for(let i=0; i<30; i++){ bg.push({x:Math.random()*V_WIDTH, y:Math.random()*V_HEIGHT}); bgFar.push({x:Math.random()*V_WIDTH, y:Math.random()*V_HEIGHT}); }
    resize(); switchScreen('mainMenu'); requestAnimationFrame(update);
</script>
</body>
</html>
