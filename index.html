<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Night Shift Wizard: Arcane Overdrive</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b1a; /* Dark navy/purple */
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            border: 4px solid #22223b;
            background-color: #050510;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .overlay-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background: rgba(11, 11, 26, 0.9);
            padding: 30px;
            pointer-events: auto;
            border: 2px solid #4a4e69;
            border-radius: 8px;
        }

        button {
            background-color: #4a4e69;
            color: #fff;
            border: 2px solid #9a8c98;
            padding: 12px 24px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 15px;
            font-family: inherit;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:hover { background-color: #9a8c98; color: #22223b; }
        button:active { transform: scale(0.95); }

        #combo-text {
            position: absolute;
            top: 50px;
            left: 10px;
            color: #ffd700;
            font-weight: bold;
            font-size: 20px;
            text-shadow: 2px 2px 0px #000;
            display: none;
        }

        #score-text {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-weight: bold;
            font-size: 24px;
            text-shadow: 2px 2px 0px #000;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="score-text">SCORE: 0</div>
            <div id="combo-text">COMBO x1</div>
            
            <div id="startScreen" class="overlay-screen">
                <h1 style="color: #9a8c98; margin: 0 0 10px 0;">ARCANE OVERDRIVE</h1>
                <p style="margin: 5px 0;">Catch Stars & Comets.</p>
                <p style="margin: 5px 0; color: #ff4a4a;">Dodge Cursed Skulls.</p>
                <p style="margin: 5px 0; color: #4ae8ff;">Potions grant Shields.</p>
                <button onclick="startGame()">START GAME</button>
            </div>

            <div id="gameOverScreen" class="overlay-screen" style="display: none;">
                <h1 style="color: #ff4a4a; margin: 0 0 10px 0;">CURSED!</h1>
                <p id="finalScoreText" style="font-size: 1.5rem; margin: 0;">Score: 0</p>
                <button onclick="startGame()">RETRY</button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreText = document.getElementById('finalScoreText');
    const scoreText = document.getElementById('score-text');
    const comboText = document.getElementById('combo-text');

    // --- AUDIO SYSTEM (Web Audio API) ---
    let audioCtx = null;
    
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        
        if (type === 'bloop') {
            // Star collection: High pitch, quick slide up
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'chime') {
            // Potion collection: Pleasant dual-tone arpeggio effect
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, now); // A4
            osc.frequency.setValueAtTime(880, now + 0.1); // A5
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        } else if (type === 'crunch') {
            // Skull hit: Harsh square wave
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now);
            osc.stop(now + 0.2);
        }
    }

    // --- PIXEL ART PRE-RENDERING ---
    const C = {
        _: 'transparent',
        W: '#ffffff', // White
        S: '#c0c0c0', // Silver
        G: '#ffd700', // Gold
        O: '#ff8c00', // Orange
        R: '#ff4a4a', // Red
        D: '#8b0000', // Dark Red
        P: '#6a31a1', // Purple
        X: '#3e1a5f', // Dark Purple
        K: '#e0e0e0', // Skull/Skin
        B: '#000000', // Black
        C: '#00ffff', // Cyan (Potion)
        L: '#008b8b' // Dark Cyan
    };

    const spritesData = {
        wizard: [
            ['_','_','_','_','_','P','P','P','_','_','_','_','_','_','_','_'],
            ['_','_','_','_','P','P','P','P','P','_','_','_','_','_','_','_'],
            ['_','_','_','P','P','P','P','P','P','P','_','_','_','_','_','_'],
            ['_','_','_','_','_','K','K','K','_','_','_','_','_','_','_','_'],
            ['_','_','_','_','K','B','K','B','K','_','_','_','_','_','_','_'],
            ['_','_','_','_','K','K','W','K','K','_','_','_','_','_','_','_'],
            ['_','_','_','W','W','W','W','W','W','W','_','_','_','_','_','_'],
            ['_','_','P','P','P','P','P','P','P','P','P','_','_','_','_','_'],
            ['_','P','P','P','P','P','P','P','P','P','P','P','_','_','_','_'],
            ['_','P','P','P','P','P','P','P','P','P','P','P','_','_','_','_'],
            ['_','P','X','P','P','P','P','P','P','P','X','P','_','_','_','_'],
            ['_','P','X','P','P','P','P','P','P','P','X','P','_','_','_','_'],
            ['_','_','_','X','X','X','X','X','X','X','_','_','_','_','_','_'],
            ['_','_','_','B','B','_','_','B','B','_','_','_','_','_','_','_']
        ],
        star: [
            ['_','_','_','_','_','_','_','W','_','_','_','_','_','_','_','_'],
            ['_','_','_','_','_','_','W','W','W','_','_','_','_','_','_','_'],
            ['_','_','_','_','_','W','W','S','W','W','_','_','_','_','_','_'],
            ['_','_','_','_','W','W','S','S','S','W','W','_','_','_','_','_'],
            ['W','W','W','W','W','S','S','W','S','S','W','W','W','W','W','_'],
            ['_','W','W','S','S','S','W','W','W','S','S','S','W','W','_','_'],
            ['_','_','W','W','S','S','S','W','S','S','S','W','W','_','_','_'],
            ['_','_','_','W','W','S','S','S','S','S','W','W','_','_','_','_'],
            ['_','_','W','W','W','S','S','S','S','S','W','W','W','_','_','_'],
            ['_','W','W','W','_','W','W','W','W','W','_','W','W','W','_','_'],
            ['W','W','_','_','_','_','_','_','_','_','_','_','_','W','W','_']
        ],
        comet: [
            ['_','_','_','_','_','_','_','R','_','_','_','_','_','_','_','_'],
            ['_','_','_','_','_','_','O','O','O','_','_','_','_','_','_','_'],
            ['_','_','_','_','_','_','_','O','_','_','_','_','_','_','_','_'],
            ['_','_','_','_','_','_','G','G','G','_','_','_','_','_','_','_'],
            ['_','_','_','_','_','G','G','W','G','G','_','_','_','_','_','_'],
            ['_','_','_','_','G','G','W','W','W','G','G','_','_','_','_','_'],
            ['G','G','G','G','G','W','W','W','W','W','G','G','G','G','G','_'],
            ['_','G','G','O','O','O','W','W','W','O','O','O','G','G','_','_'],
            ['_','_','G','G','O','O','O','W','O','O','O','G','G','_','_','_'],
            ['_','_','_','G','G','O','O','O','O','O','G','G','_','_','_','_'],
            ['_','_','G','G','G','O','O','O','O','O','G','G','G','_','_','_'],
            ['_','G','G','G','_','G','G','G','G','G','_','G','G','G','_','_'],
            ['G','G','_','_','_','_','_','_','_','_','_','_','_','G','G','_']
        ],
        skull: [
            ['_','_','_','_','K','K','K','K','K','K','_','_','_','_','_','_'],
            ['_','_','K','K','K','K','K','K','K','K','K','K','_','_','_','_'],
            ['_','K','K','K','K','K','K','K','K','K','K','K','K','_','_','_'],
            ['_','K','K','B','B','K','K','K','B','B','K','K','K','_','_','_'],
            ['_','K','B','R','R','B','K','B','R','R','B','K','K','_','_','_'],
            ['_','K','B','R','R','B','K','B','R','R','B','K','K','_','_','_'],
            ['_','K','K','B','B','K','K','K','B','B','K','K','K','_','_','_'],
            ['_','_','K','K','K','K','D','D','K','K','K','K','_','_','_','_'],
            ['_','_','_','K','K','D','D','D','D','K','K','_','_','_','_','_'],
            ['_','_','_','_','K','K','K','K','K','K','_','_','_','_','_','_'],
            ['_','_','_','_','K','B','K','B','K','B','_','_','_','_','_','_']
        ],
        potion: [
            ['_','_','_','_','_','_','W','W','_','_','_','_','_','_','_','_'],
            ['_','_','_','_','_','B','O','O','B','_','_','_','_','_','_','_'],
            ['_','_','_','_','_','B','O','O','B','_','_','_','_','_','_','_'],
            ['_','_','_','_','_','B','W','W','B','_','_','_','_','_','_','_'],
            ['_','_','_','_','B','C','C','C','C','B','_','_','_','_','_','_'],
            ['_','_','_','B','C','C','W','C','C','C','B','_','_','_','_','_'],
            ['_','_','_','B','C','W','C','C','L','C','B','_','_','_','_','_'],
            ['_','_','B','C','C','C','C','L','L','C','C','B','_','_','_','_'],
            ['_','_','B','C','C','C','L','L','L','C','C','B','_','_','_','_'],
            ['_','_','B','C','C','C','C','C','C','C','C','B','_','_','_','_'],
            ['_','_','_','B','B','B','B','B','B','B','B','_','_','_','_','_']
        ]
    };

    const renderedSprites = {};

    function preRenderSprites() {
        for (const [name, data] of Object.entries(spritesData)) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 16;
            tempCanvas.height = 16;
            const tCtx = tempCanvas.getContext('2d');
            
            for (let r = 0; r < data.length; r++) {
                for (let c = 0; c < data[r].length; c++) {
                    const colorCode = data[r][c];
                    if (colorCode !== '_') {
                        tCtx.fillStyle = C[colorCode];
                        tCtx.fillRect(c, r, 1, 1);
                    }
                }
            }
            renderedSprites[name] = tempCanvas;
        }
    }
    preRenderSprites();

    // --- GAME CONSTANTS & VARIABLES ---
    const V_WIDTH = 320;
    const V_HEIGHT = 480;
    
    let isPlaying = false;
    let lastTime = 0;
    let score = 0;
    let baseSpeedModifier = 1;
    let keys = { ArrowLeft: false, ArrowRight: false, KeyA: false, KeyD: false };
    
    // Combo System
    let comboMult = 1;
    let comboTimer = 0; // Time remaining for combo in seconds
    const COMBO_MAX_TIME = 3.0;

    let player = {
        x: V_WIDTH / 2 - 16,
        y: V_HEIGHT - 48,
        w: 32,
        h: 32,
        speed: 250, // pixels per second
        hasShield: false
    };

    let items = [];
    let particles = [];
    let bgStars = [];
    let spawnTimer = 0;

    // --- SETUP & RESIZE ---
    function resize() {
        const scale = Math.min(window.innerWidth / V_WIDTH, window.innerHeight / V_HEIGHT);
        canvas.width = V_WIDTH * scale;
        canvas.height = V_HEIGHT * scale;
        ctx.scale(scale, scale);
    }
    window.addEventListener('resize', resize);
    resize();

    // Create Background Stars
    for(let i=0; i<50; i++) {
        bgStars.push({
            x: Math.random() * V_WIDTH,
            y: Math.random() * V_HEIGHT,
            s: Math.random() * 2 + 1, // size
            v: Math.random() * 30 + 10 // velocity (px/sec)
        });
    }

    // --- INPUT HANDLING ---
    window.addEventListener('keydown', e => { 
        if (keys.hasOwnProperty(e.code)) keys[e.code] = true; 
        initAudio(); 
    });
    window.addEventListener('keyup', e => { 
        if (keys.hasOwnProperty(e.code)) keys[e.code] = false; 
    });

    let activeTouchX = null;
    canvas.addEventListener('touchstart', e => {
        initAudio();
        const rect = canvas.getBoundingClientRect();
        activeTouchX = (e.touches[0].clientX - rect.left) / (rect.width / V_WIDTH);
        e.preventDefault();
    }, {passive: false});
    
    canvas.addEventListener('touchmove', e => {
        const rect = canvas.getBoundingClientRect();
        activeTouchX = (e.touches[0].clientX - rect.left) / (rect.width / V_WIDTH);
        e.preventDefault();
    }, {passive: false});

    canvas.addEventListener('touchend', e => {
        activeTouchX = null;
        e.preventDefault();
    }, {passive: false});

    // --- GAME LOGIC ---
    function spawnItem() {
        const rand = Math.random();
        let type, sprite, w, h, speedBase, color;

        if (rand > 0.95) {
            type = 'potion'; sprite = 'potion'; w = 24; h = 24; speedBase = 120; color = '#00ffff';
        } else if (rand > 0.85) {
            type = 'comet'; sprite = 'comet'; w = 28; h = 28; speedBase = 220; color = '#ffd700';
        } else if (rand > 0.5) {
            type = 'star'; sprite = 'star'; w = 24; h = 24; speedBase = 100; color = '#ffffff';
        } else {
            type = 'skull'; sprite = 'skull'; w = 24; h = 24; speedBase = 110; color = '#8b0000';
        }

        items.push({
            x: Math.random() * (V_WIDTH - w),
            y: -32,
            w: w, h: h, type: type, sprite: sprite, color: color,
            speed: speedBase * baseSpeedModifier
        });
    }

    function spawnParticles(x, y, color) {
        for(let i=0; i<8; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 100 + 50;
            particles.push({
                x: x, y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 0.5, // 0.5 seconds
                maxLife: 0.5,
                color: color
            });
        }
    }

    function startGame() {
        initAudio();
        score = 0;
        comboMult = 1;
        comboTimer = 0;
        baseSpeedModifier = 1;
        items = [];
        particles = [];
        player.x = V_WIDTH / 2 - 16;
        player.hasShield = false;
        
        startScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';
        updateUI();
        
        isPlaying = true;
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
    }

    function updateUI() {
        scoreText.innerText = `SCORE: ${score}`;
        if (comboMult > 1) {
            comboText.style.display = 'block';
            comboText.innerText = `COMBO x${comboMult}`;
            // Dynamic color based on combo
            comboText.style.color = comboMult > 4 ? '#ff4a4a' : (comboMult > 2 ? '#ffa500' : '#ffd700');
        } else {
            comboText.style.display = 'none';
        }
    }

    function gameOver() {
        isPlaying = false;
        playSound('crunch');
        gameOverScreen.style.display = 'flex';
        finalScoreText.innerText = `Final Score: ${score}`;
    }

    // --- MAIN LOOP ---
    function gameLoop(timestamp) {
        if (!isPlaying) return;

        let dt = (timestamp - lastTime) / 1000; // Delta time in seconds
        if (dt > 0.1) dt = 0.1; // Cap dt to prevent huge jumps if tab is inactive
        lastTime = timestamp;

        // 1. Handle Input (Movement applied with dt)
        let moveDir = 0;
        if (keys.ArrowLeft || keys.KeyA) moveDir = -1;
        if (keys.ArrowRight || keys.KeyD) moveDir = 1;
        
        if (activeTouchX !== null) {
            moveDir = activeTouchX < (V_WIDTH / 2) ? -1 : 1;
        }

        player.x += moveDir * player.speed * dt;
        
        // Constraints
        if (player.x < 0) player.x = 0;
        if (player.x > V_WIDTH - player.w) player.x = V_WIDTH - player.w;

        // 2. Update Combo System
        if (comboTimer > 0) {
            comboTimer -= dt;
            if (comboTimer <= 0) {
                comboMult = 1; // Reset combo
                updateUI();
            }
        }

        // 3. Spawning
        spawnTimer += dt;
        const spawnRate = Math.max(0.4, 1.2 - (score / 5000)); // Gets faster over time
        if (spawnTimer > spawnRate) {
            spawnItem();
            spawnTimer = 0;
        }

        // 4. Update Items & Collision
        for (let i = items.length - 1; i >= 0; i--) {
            let item = items[i];
            item.y += item.speed * dt;

            // Hitbox Padding (magnetic for good, forgiving for bad)
            let pad = (item.type === 'skull') ? 6 : -4;
            let hit = { x: item.x + pad, y: item.y + pad, w: item.w - (pad*2), h: item.h - (pad*2) };

            // AABB Collision
            if (player.x < hit.x + hit.w && player.x + player.w > hit.x &&
                player.y < hit.y + hit.h && player.y + player.h > hit.y) {
                
                if (item.type === 'skull') {
                    if (player.hasShield) {
                        player.hasShield = false;
                        playSound('crunch');
                        spawnParticles(item.x + item.w/2, item.y + item.h/2, '#00ffff'); // Shield breaking effect
                        items.splice(i, 1);
                    } else {
                        gameOver();
                        return; // Stop update loop
                    }
                } else {
                    // Good items
                    if (item.type === 'star') score += 10 * comboMult;
                    if (item.type === 'comet') score += 50 * comboMult;
                    if (item.type === 'potion') { player.hasShield = true; playSound('chime'); }
                    else { playSound('bloop'); }

                    spawnParticles(item.x + item.w/2, item.y + item.h/2, item.color);
                    
                    if (item.type !== 'potion') {
                        comboMult++;
                        comboTimer = COMBO_MAX_TIME;
                        baseSpeedModifier += 0.02; // Global speed up
                    }
