<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Night Shift Wizard 4.0</title>
    <style>
        body {
            margin: 0;
            background: #020205;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Prevent scroll on mobile touch */
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 100vh;
            max-height: 800px;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.3);
            background: linear-gradient(to bottom, #050510, #1a0a2a);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }
        #hud {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            text-shadow: 2px 2px 0 #000;
            font-weight: bold;
        }
        #menu, #game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 2, 5, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }
        .hidden { display: none !important; }
        button {
            margin: 10px; padding: 15px 30px;
            background: #2a0a4a; color: #fff;
            border: 2px solid #8a2be2; cursor: pointer;
            font-family: inherit; font-size: 18px;
            text-transform: uppercase;
            transition: 0.2s;
            border-radius: 8px;
        }
        button:hover { background: #8a2be2; box-shadow: 0 0 15px #8a2be2; }
        h1 { color: #b388ff; text-align: center; text-shadow: 0 0 10px #b388ff; }
        #new-record {
            position: absolute;
            top: 30%; width: 100%; text-align: center;
            color: #ffaa00; font-size: 32px; font-weight: bold;
            animation: pulse 0.5s infinite alternate;
            text-shadow: 0 0 20px #ff0000;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-layer" id="hud-layer">
        <div id="hud">
            <div>Mana: <span id="scoreDisplay">0</span><br>Combo: <span id="comboDisplay">0</span></div>
            <div style="text-align:right;">High Score: <span id="highScoreDisplay">0</span><br>HP: <span id="hpDisplay">3</span></div>
        </div>
        <div id="new-record" class="hidden">NEW RECORD!</div>
    </div>

    <div id="menu">
        <h1>NIGHT SHIFT WIZARD<br><span style="font-size: 0.5em; color: #888;">Update 4.0</span></h1>
        <p>Highest Mana: <span id="menuHighScore">0</span></p>
        <button onclick="startGame(false)">Night Shift (Standard)</button>
        <button onclick="startGame(true)">Boss Rush</button>
    </div>

    <div id="game-over" class="hidden">
        <h1 style="color: #ff3333;">SHIFT ENDED</h1>
        <p>Final Mana: <span id="finalScore">0</span></p>
        <button onclick="showMenu()">Back to Menu</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Resize canvas to match container
    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // --- META-PROGRESSION ---
    let score = 0;
    let combo = 0;
    let playerHp = 3;
    let highScore = parseInt(localStorage.getItem('wizardHighScore')) || 0;
    let highCombo = parseInt(localStorage.getItem('wizardHighCombo')) || 0;

    // --- GAME STATE ---
    let state = 'MENU';
    let isBossRush = false;
    let bossLevel = 1;
    let frames = 0;

    // Entities
    let player = { x: canvas.width / 2, y: canvas.height - 60, width: 30, height: 40 };
    let spells = [];
    let items = []; // Falling mana/hazards
    let boss = null;

    // --- SCREEN SHAKE ---
    let shakeFrames = 0;
    let shakeIntensity = 0;
    function triggerShake(duration, intensity) {
        shakeFrames = duration;
        shakeIntensity = intensity;
    }

    // --- PARALLAX STARS ---
    const createStars = (count, speedMult, sizeMult, color) => {
        return Array.from({ length: count }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            speed: (Math.random() * 0.5 + 0.2) * speedMult,
            size: (Math.random() * 1.5 + 0.5) * sizeMult,
            color: color
        }));
    };
    const deepSpaceStars = createStars(60, 0.3, 1, '#2a2a5a');
    const foregroundStars = createStars(30, 1.5, 1.5, '#ffffff');

    // --- INPUT HANDLING (Touch & Mouse) ---
    function updatePlayerPosition(e) {
        if (state !== 'PLAYING') return;
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const rect = canvas.getBoundingClientRect();
        player.x = clientX - rect.left;
        
        // Keep wizard in bounds
        if (player.x < 15) player.x = 15;
        if (player.x > canvas.width - 15) player.x = canvas.width - 15;
    }
    canvas.addEventListener('mousemove', updatePlayerPosition);
    canvas.addEventListener('touchmove', updatePlayerPosition);

    // Auto-fire timer for Boss Rush
    setInterval(() => {
        if (state === 'PLAYING' && isBossRush) {
            spells.push({ x: player.x, y: player.y - 40, speed: 7, radius: 4 });
        }
    }, 200); // Shoot every 200ms

    // --- CORE LOGIC ---
    function startGame(bossRushToggled) {
        isBossRush = bossRushToggled;
        state = 'PLAYING';
        score = 0; combo = 0; playerHp = 3; bossLevel = 1; items = []; spells = []; boss = null;
        frames = 0;
        
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('game-over').classList.add('hidden');
        document.getElementById('new-record').classList.add('hidden');
        updateHUD();

        if (isBossRush) spawnBoss();
    }

    function showMenu() {
        state = 'MENU';
        document.getElementById('game-over').classList.add('hidden');
        document.getElementById('menu').classList.remove('hidden');
        document.getElementById('menuHighScore').innerText = highScore;
    }

    function updateHUD() {
        document.getElementById('scoreDisplay').innerText = score;
        document.getElementById('comboDisplay').innerText = combo;
        document.getElementById('hpDisplay').innerText = playerHp;
        document.getElementById('highScoreDisplay').innerText = highScore;
    }

    function spawnBoss() {
        boss = {
            x: canvas.width / 2, y: 100,
            hp: 20 + (bossLevel * 10), maxHp: 20 + (bossLevel * 10),
            shield: bossLevel > 1 ? 10 : 0, maxShield: 10,
            width: 80, height: 80,
            speed: 2 + (bossLevel * 0.5), direction: 1
        };
    }

    function gameOver() {
        state = 'GAMEOVER';
        document.getElementById('game-over').classList.remove('hidden');
        document.getElementById('finalScore').innerText = score;

        if (score > highScore) {
            highScore = score;
            localStorage.setItem('wizardHighScore', highScore);
            document.getElementById('new-record').classList.remove('hidden');
        }
        if (combo > highCombo) {
            highCombo = combo;
            localStorage.setItem('wizardHighCombo', highCombo);
        }
    }

    function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
        return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
    }

    // --- DRAWING WIZARD ---
    function drawWizard() {
        ctx.save();
        ctx.translate(player.x, player.y);
        
        // Robe
        ctx.fillStyle = '#8a2be2';
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.lineTo(-15, 20);
        ctx.lineTo(15, 20);
        ctx.fill();
        
        // Head
        ctx.fillStyle = '#ffccaa';
        ctx.beginPath();
        ctx.arc(0, -15, 10, 0, Math.PI * 2);
        ctx.fill();

        // Magical Top Hat
        ctx.fillStyle = '#111';
        ctx.fillRect(-15, -25, 30, 4); // brim
        ctx.fillRect(-10, -45, 20, 20); // top
        ctx.fillStyle = '#b388ff';
        ctx.fillRect(-10, -30, 20, 5); // band

        ctx.restore();
    }

    // --- GAME LOOP ---
    function updateAndDraw() {
        // 1. Clear & Draw Parallax
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        [deepSpaceStars, foregroundStars].forEach(layer => {
            layer.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) star.y = 0;
                ctx.fillStyle = star.color;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });
        });

        if (state === 'PLAYING') {
            frames++;
            ctx.save();

            // Apply Screen Shake
            if (shakeFrames > 0) {
                ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity);
                shakeFrames--;
            }

            drawWizard();

            // --- STANDARD MODE: Catching Items ---
            if (!isBossRush) {
                if (frames % 40 === 0) {
                    const isHazard = Math.random() > 0.7;
                    items.push({
                        x: Math.random() * (canvas.width - 20) + 10,
                        y: -20, radius: 10,
                        speed: 3 + Math.random() * 2,
                        type: isHazard ? 'HAZARD' : 'MANA'
                    });
                }

                for (let i = items.length - 1; i >= 0; i--) {
                    let item = items[i];
                    item.y += item.speed;

                    // Draw Item
                    ctx.beginPath();
                    ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2);
                    ctx.fillStyle = item.type === 'MANA' ? '#00ffff' : '#ff3333';
                    ctx.fill();

                    // Collision with Wizard
                    if (Math.hypot(player.x - item.x, (player.y - 10) - item.y) < 25) {
                        if (item.type === 'MANA') {
                            combo++;
                            score += 10 * combo;
                        } else {
                            playerHp--;
                            combo = 0;
                            triggerShake(15, 10);
                            if (playerHp <= 0) gameOver();
                        }
                        items.splice(i, 1);
                        updateHUD();
                        continue;
                    }

                    if (item.y > canvas.height) {
                        if (item.type === 'MANA') combo = 0; // Missed good item resets combo
                        items.splice(i, 1);
                        updateHUD();
                    }
                }
            }

            // --- BOSS RUSH MODE ---
            if (isBossRush && boss) {
                // Boss Movement
                boss.x += boss.speed * boss.direction;
                if (boss.x > canvas.width - boss.width / 2 || boss.x < boss.width / 2) {
                    boss.direction *= -1;
                }

                // Boss Shooting
                if (frames % Math.max(20, 60 - bossLevel * 10) === 0) {
                    items.push({
                        x: boss.x, y: boss.y + 40, radius: 8,
                        speed: 4 + bossLevel, type: 'HAZARD'
                    });
                }

                // Draw Boss
                ctx.fillStyle = boss.shield > 0 ? '#4444ff' : '#880000';
                ctx.fillRect(boss.x - boss.width/2, boss.y - boss.height/2, boss.width, boss.height);
                
                // Draw HP / Shield Bars
                ctx.fillStyle = 'red';
                ctx.fillRect(boss.x - 40, boss.y - 60, 80, 6);
                ctx.fillStyle = 'lime';
                ctx.fillRect(boss.x - 40, boss.y - 60, 80 * (boss.hp / boss.maxHp), 6);
                if (boss.shield > 0) {
                    ctx.fillStyle = 'cyan';
                    ctx.fillRect(boss.x - 40, boss.y - 50, 80 * (boss.shield / boss.maxShield), 4);
                }

                // Update Wizard Spells
                for (let i = spells.length - 1; i >= 0; i--) {
                    let s = spells[i];
                    s.y -= s.speed;
                    
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffaa00';
                    ctx.fill();

                    // Collision with Boss
                    if (rectIntersect(s.x - s.radius, s.y - s.radius, s.radius*2, s.radius*2, 
                                      boss.x - boss.width/2, boss.y - boss.height/2, boss.width, boss.height)) {
                        spells.splice(i, 1);
                        
                        if (boss.shield > 0) {
                            boss.shield--;
                            triggerShake(3, 2); // Small shake for shield break
                        } else {
                            boss.hp--;
                            combo++;
                            score += 10 * combo;
                            triggerShake(5, 5); // Shake for HP damage
                        }
                        
                        if (boss.hp <= 0) {
                            score += bossLevel * 1000;
                            bossLevel++;
                            triggerShake(20, 15);
                            boss = null;
                            setTimeout(spawnBoss, 2000); // Next boss delay
                        }
                        updateHUD();
                        continue;
                    }

                    if (s.y < 0) spells.splice(i, 1);
                }

                // Update Boss Hazards
                for (let i = items.length - 1; i >= 0; i--) {
                    let item = items[i];
                    item.y += item.speed;
                    
                    ctx.beginPath();
                    ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#ff3333';
                    ctx.fill();

                    if (Math.hypot(player.x - item.x, (player.y - 10) - item.y) < 20) {
                        playerHp--;
                        combo = 0;
                        triggerShake(15, 10);
                        items.splice(i, 1);
                        updateHUD();
                        if (playerHp <= 0) gameOver();
                        continue;
                    }
                    if (item.y > canvas.height) items.splice(i, 1);
                }
            }

            ctx.restore();
        }
        requestAnimationFrame(updateAndDraw);
    }

    document.getElementById('menuHighScore').innerText = highScore;
    updateAndDraw();

</script>
</body>
</html>
