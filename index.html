<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Night Shift Wizard: Arcane Overdrive</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b1a;
            color: #fff;
            font-family: 'Press Start 2P', 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
            border: 4px solid #333;
            background-color: #050510;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            background: linear-gradient(to bottom, #050510 0%, #111128 100%);
            cursor: none;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .overlay-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: rgba(5, 5, 16, 0.95);
            padding: 20px;
            pointer-events: auto;
            border: 2px solid #5d275d;
            border-radius: 8px;
            width: 80%;
            max-width: 280px;
        }
        .pixel-title {
            font-size: 20px;
            color: #ff00ff;
            text-shadow: 3px 3px 0px #3e1a5f;
            margin-bottom: 5px;
            line-height: 1.4;
            cursor: pointer; /* Hint for the secret */
        }
        .subtitle {
            font-size: 10px;
            color: #00ffff;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .menu-text {
            font-size: 9px;
            line-height: 1.8;
            margin-bottom: 15px;
            color: #e0e0e0;
        }
        .boss-warning {
            display: none;
            position: absolute;
            top: 35%;
            color: #ff4444;
            font-size: 14px;
            text-shadow: 2px 2px 0px #000;
            animation: blink 0.4s infinite alternate;
        }
        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        button {
            background-color: #3e1a5f;
            color: white;
            border: 2px solid #8a3a8a;
            padding: 12px;
            font-size: 10px;
            cursor: pointer;
            margin-top: 10px;
            font-family: inherit;
            width: 100%;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        button:hover { background-color: #6a31a1; transform: scale(1.05); }
        button:active { background-color: #ff00ff; }
        /* Custom Checkbox for Settings */
        label { font-size: 10px; display: flex; align-items: center; cursor: pointer; margin: 10px 0; }
        input[type="checkbox"] { width: 16px; height: 16px; margin-right: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            
            <div id="mainMenuScreen" class="overlay-screen">
                <h1 class="pixel-title" onclick="registerSecretClick()">NIGHT SHIFT WIZARD</h1>
                <p class="subtitle">ARCANE OVERDRIVE</p>
                <button onclick="startGame()">PLAY</button>
                <button onclick="switchScreen('howToPlayScreen')">HOW TO PLAY</button>
                <button onclick="switchScreen('optionsScreen')">OPTIONS</button>
            </div>
            <div id="howToPlayScreen" class="overlay-screen" style="display: none;">
                <h2 style="font-size: 12px; color: #ffd700;">HOW TO PLAY</h2>
                <div class="menu-text" style="text-align: left;">
                    <span style="color:#fff;">CATCH:</span> Stars & Comets<br><br>
                    <span style="color:#ff4444;">DODGE:</span> Skulls & Phantoms<br><br>
                    <span style="color:#00ffff;">POTION:</span> Grants Shield<br><br>
                    <span style="color:#39ff14;">BOOTS:</span> 10x Speed + Ramming<br><br>
                    <span style="color:#ff00ff;">JEWEL:</span> Magnetizes Loot
                </div>
                <button onclick="switchScreen('mainMenuScreen')">BACK</button>
            </div>
            <div id="optionsScreen" class="overlay-screen" style="display: none;">
                <h2 style="font-size: 12px; color: #ffd700;">OPTIONS</h2>
                <label><input type="checkbox" id="muteToggle" onchange="toggleMute()"> Mute Sound</label>
                <label><input type="checkbox" id="bgToggle" checked onchange="toggleBg()"> Show Stars</label>
                <button onclick="switchScreen('mainMenuScreen')">BACK</button>
            </div>
            <div id="devToolsScreen" class="overlay-screen" style="display: none; border-color: #39ff14;">
                <h2 style="font-size: 14px; color: #39ff14; text-shadow: 2px 2px 0px #000;">DEV TOOLS</h2>
                <label style="color: #39ff14;"><input type="checkbox" id="invincibilityToggle" onchange="toggleInvincibility()"> INVINCIBILITY</label>
                <button style="background-color: #006400; border-color: #39ff14;" onclick="switchScreen('mainMenuScreen')">CLOSE MENU</button>
            </div>
            <div id="bossWarning" class="boss-warning">BOSS APPROACHING!</div>
            
            <div id="gameOverScreen" class="overlay-screen" style="display: none;">
                <h1 style="color: #ff4444; font-size: 20px; margin: 0 0 15px 0;">CURSED!</h1>
                <p id="finalScoreText" style="font-size: 12px; margin: 0 0 15px 0;">Score: 0</p>
                <button onclick="switchScreen('mainMenuScreen')">MAIN MENU</button>
                <button onclick="startGame()">RETRY</button>
            </div>
        </div>
    </div>

    let audioCtx = null;
    function initAudio() {

    }

    function playSound(type) {
        if (!audioCtx || isMuted) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        
        if (type === 'bloop') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
            gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'chime') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(880, now + 0.1);
            gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'crunch') {
            osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
            gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'bossHit') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
            gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);

        const pixelSize = size / 16;
        for (let r = 0; r < sprite.length; r++) {
            for (let c = 0; c < sprite[r].length; c++) {
                const colorKey = sprite[r][c];
                if (colorKey !== 'tr') {
                    ctx.fillStyle = colors[colorKey] || '#ff00ff';
                    ctx.fillRect(x + (c * pixelSize), y + (r * pixelSize), pixelSize + 0.5, pixelSize + 0.5);
                }
            }
        }
    }

        let type = 'skull', sprite = skullSprite, w = 24, h = 24, sBase = 110, col = '#8b0000';
        let categoryRoll = Math.random();
        // 10% Chance Powerup
        if (categoryRoll > 0.90) {
            let pRoll = Math.random();
            if (pRoll > 0.75 && score >= 3000) { type = 'rocket'; sprite = rocketSprite; sBase = 140; col = '#39ff14'; }
            else if (pRoll > 0.50 && score >= 2000) { type = 'blast'; sprite = blastSprite; sBase = 140; col = '#ff4444'; }
            else if (pRoll > 0.25 && score >= 800) { type = 'magnet'; sprite = magnetSprite; sBase = 140; col = '#ff00ff'; }
            else { type = 'potion'; sprite = potionSprite; sBase = 130; col = '#00ffff'; }
        } 
        // 25% Chance Good
        else if (categoryRoll > 0.65) {
            if (Math.random() > 0.5 && score >= 200) { type = 'comet'; sprite = cometSprite; w = 28; h = 28; sBase = 220; col = '#ffd700'; }
            else { type = 'star'; sprite = starSprite; sBase = 120; col = '#ffffff'; }
        } 
        // 65% Chance Hazard
        else {
            let eRoll = Math.random();
            if (eRoll > 0.85 && score >= 2500) { type = 'bat'; sprite = batSprite; sBase = 120; col = '#a9a9a9'; }
            else if (eRoll > 0.65 && score >= 1100) { type = 'specter'; sprite = specterSprite; sBase = 75; col = '#ffffff'; }
            else if (eRoll > 0.35 && score >= 500) { type = 'phantom'; sprite = phantomSprite; sBase = 100; col = '#6a31a1'; }
            else { type = 'skull'; sprite = skullSprite; sBase = 110; col = '#8b0000'; }

    // --- MAIN GAME LOOP ---
    function update(timestamp) {
        let dt = (timestamp - lastTime) / 1000 || 0.016; 
        if (dt > 0.1) dt = 0.1; 
        lastTime = timestamp;

            bgStars.forEach(s => {
                s.y += s.speed * dt * (rocketTimer > 0 ? 5 : 1);
                if (s.y > V_HEIGHT) { s.y = 0; s.x = Math.random() * V_WIDTH; }
            });
            if (shakeIntensity > 0) {
                shakeIntensity -= dt * 15; // Smoothly reduce shake over time
            }
        }
        // Particle Updates
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.9; p.vy *= 0.9; p.life -= dt;
            if (p.life <= 0) particles.splice(i, 1);
        }

        }

        if (keys.left) { player.x -= player.speed * dt; mouseX = player.x; } 
        else if (keys.right) { player.x += player.speed * dt; mouseX = player.x; } 
        else { player.x += (mouseX - player.x) * (player.speed/50) * dt; }
        if (player.x < 0) { player.x = 0; mouseX = 0; }
        if (player.x > V_WIDTH - player.w) { player.x = V_WIDTH - player.w; mouseX = V_WIDTH - player.w; }

            bossActive = true; boss.type = bossLevel % 4; boss.maxHp = 5 + (bossLevel * 2); boss.hp = boss.maxHp;
            boss.y = -80; boss.wave = 0; boss.teleportTimer = 0;

            playSound('bossHit');

        if (bossActive) {
            let isEnraged = boss.hp <= 2; 
            if (boss.y < 20) {
                boss.y += 50 * worldDt; 
            } else {
                if (boss.type === 0) { boss.x += boss.speed * (isEnraged?1.5:1) * boss.dir * worldDt; if (boss.x < 0 || boss.x > V_WIDTH - boss.w) boss.dir *= -1; } 
                else if (boss.type === 1) { boss.wave += worldDt * (isEnraged?2.5:1.5); boss.x = (V_WIDTH/2 - boss.w/2) + Math.sin(boss.wave * 1.5) * 100; }

                else if (boss.type === 3) { boss.teleportTimer += worldDt; if (boss.teleportTimer > (isEnraged?1.5:2.5)) { boss.x = Math.random() * (V_WIDTH - boss.w); boss.teleportTimer = 0; spawnParticles(boss.x + boss.w/2, boss.y + boss.h/2, '#808080'); } }
                boss.attackTimer += worldDt;
                let atkRate = Math.max(0.4, 0.8 - (bossLevel * 0.05));
                if (isEnraged) atkRate *= 0.75;
                if (boss.attackTimer > atkRate) {
                    boss.attackTimer = 0;
                    if (Math.random() > 0.70) items.push({ x: Math.random() * (V_WIDTH - 24), y: -30, w: 24, h: 24, type: 'skull', sprite: skullSprite, speed: 110 * (baseSpeed / 100), vx: 0, color: '#8b0000', wave: 0 });
                    let isWeakness = Math.random() > 0.85; 
                    if (isWeakness) { items.push({ x: boss.x + boss.w/2 - 12, y: boss.y + boss.h, w: 24, h: 24, type: 'holyStar', sprite: holyStarSprite, speed: 130, vx: 0, color: '#00ffff' }); } 
                    else {
                        if (boss.type === 0) { 
                            if(isEnraged) { items.push({ x: boss.x + boss.w/2 - 20, y: boss.y + boss.h, w: 24, h: 24, type: 'fireball', sprite: fireballSprite, speed: 220, vx: -30, color: '#ff4444' }); items.push({ x: boss.x + boss.w/2 + 4, y: boss.y + boss.h, w: 24, h: 24, type: 'fireball', sprite: fireballSprite, speed: 220, vx: 30, color: '#ff4444' }); }
                            else { items.push({ x: boss.x + boss.w/2 - 12, y: boss.y + boss.h, w: 24, h: 24, type: 'fireball', sprite: fireballSprite, speed: 220, vx: 0, color: '#ff4444' }); }
                        } 
                        else if (boss.type === 1) { let spread = isEnraged?110:80; for(let j=-1; j<=1; j++) items.push({ x: boss.x + boss.w/2 - 12, y: boss.y + boss.h, w: 24, h: 24, type: 'fireball', sprite: fireballSprite, speed: isEnraged?250:200, vx: j * spread, color: '#8a2be2' }); } 
                        else if (boss.type === 2) { items.push({ x: boss.x + boss.w/2 - 12, y: boss.y + boss.h, w: 24, h: 24, type: 'phantom', sprite: phantomSprite, speed: isEnraged?200:160, wave: Math.random() * Math.PI, vx: 0, color: '#006400' }); } 
                        else if (boss.type === 3) { 
                            let gap = Math.floor(Math.random() * 5); let stagger = Math.floor(Math.random() * 3); let wSpd = isEnraged?260:160;
                            for(let k=0; k<5; k++) { if (k !== gap) { let yOff = (stagger===0)?k*28:(stagger===1)?(4-k)*28:Math.abs(2-k)*25; items.push({ x: (V_WIDTH/5) * k + 10, y: boss.y + boss.h - yOff, w: 24, h: 24, type: 'skull', sprite: skullSprite, speed: wSpd, vx: 0, color: '#a9a9a9' }); } }

                    }

        } else {
            spawnTimer += worldDt;
            if (spawnTimer > Math.max(0.3, 0.8 - (score / 5000))) { spawnItem(); spawnTimer = 0; }
        }
        // ITEM MOVEMENT
        for (let i = items.length - 1; i >= 0; i--) {

            item.y += item.speed * worldDt;
            item.x += (item.vx || 0) * worldDt;
            if (item.type === 'phantom') { item.wave += worldDt * 5; item.x += Math.sin(item.wave) * 150 * worldDt; }
            if (item.type === 'specter' && item.y < V_HEIGHT * 0.6) { item.x += Math.sign(player.x - item.x) * 40 * worldDt; }

                    else if (item.type === 'magnet') { magnetTimer = 5.0; playSound('chime'); }
                    else if (item.type === 'blast')  { laserTimer = 2.0; playSound('bossHit'); }
                    else { playSound('bloop'); comboMult++; comboTimer = 3.0; baseSpeed += 1; }
                    
                    spawnParticles(item.x + item.w/2, item.y + item.h/2, item.color);
                    items.splice(i, 1);
                }
                continue;
            }
            if (item.y > V_HEIGHT || item.x < -100 || item.x > V_WIDTH + 100) items.splice(i, 1);
        }
        render(); 
        requestAnimationFrame(update);
    }
    function render() {
        ctx.clearRect(0, 0, V_WIDTH, V_HEIGHT); // 1. Clear first
    
        ctx.save(); // 2. Save the clean state
        
        if (shakeIntensity > 0) {
            const dx = (Math.random() - 0.5) * shakeIntensity;
            const dy = (Math.random() - 0.5) * shakeIntensity;
            ctx.translate(dx, dy); // 3. Offset the entire world
        }
        
        // Draw Bg Stars
        if(showBgStars) {
            ctx.fillStyle = '#ffffff';
            bgStars.forEach(s => { ctx.globalAlpha = 0.3; ctx.fillRect(s.x, s.y, s.size, s.size); });
            ctx.globalAlpha = 1.0;
        }
        // Draw Laser
        if (laserTimer > 0 && gameState === 'PLAYING') {
            ctx.fillStyle = 'rgba(255, 68, 68, 0.8)'; ctx.fillRect(player.x + 8, 0, 16, player.y + 16);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)'; ctx.fillRect(player.x + 12, 0, 8, player.y + 16);
        }
        // Draw Player Shield
        if (player.hasShield && gameState === 'PLAYING') {
            ctx.beginPath(); ctx.arc(player.x + player.w/2, player.y + player.h/2, player.w/1.4, 0, Math.PI * 2);
            ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2; ctx.stroke();
        }
        // Draw Entities
        drawPixelSprite(wizardSprite, player.x, player.y, player.w);
        items.forEach(item => drawPixelSprite(item.sprite, item.x, item.y, item.w));
        if (bossActive && boss.y > -boss.h) {
            drawPixelSprite(bossSprites[boss.type], boss.x, boss.y, boss.w);
            ctx.fillStyle = '#333'; ctx.fillRect(boss.x, boss.y - 10, boss.w, 6);
            ctx.fillStyle = '#ff4444'; ctx.fillRect(boss.x, boss.y - 10, boss.w * (boss.hp / boss.maxHp), 6);
        }
        // Particles
        particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life / 0.5); ctx.fillRect(p.x, p.y, 4, 4); });
        ctx.globalAlpha = 1.0;
        // UI
        if(gameState === 'PLAYING') {
            ctx.fillStyle = "#fff"; ctx.font = "10px 'Press Start 2P', monospace"; ctx.textAlign = "left";
            ctx.shadowColor = "rgba(0, 0, 0, 0.8)"; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2; 
            
            ctx.fillText(`SCORE: ${score}`, 10, 25);
            if (comboMult > 1) {
                ctx.fillStyle = comboMult > 4 ? '#ff4444' : '#ffd700';
                ctx.fillText(`COMBO x${comboMult}`, 10, 45);
            }
            ctx.shadowColor = "transparent";
        }
        ctx.restore();
    }
    // Init Frame
    requestAnimationFrame(update);
</script>
</body>
</html>
